<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#aaa;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;-webkit-user-select:none;user-select:none}

#header{height:26px;display:flex;align-items:center;padding:0 10px;background:#080808;border-bottom:1px solid #111;flex-shrink:0;justify-content:space-between}

.csw input{opacity:0;position:absolute;top:0;left:0;width:100%;height:100%;cursor:pointer}

<body>
<div id="header">
  <div class="t"><b>DENSITY FIELD</b> · v5b</div>
  <div class="info" id="hI"></div>
</div>
<div id="main">
  <div id="scopeArea">
    <div id="glWrap"><canvas id="gl"></canvas></div>
    <canvas id="scaleCanvas"></canvas>
    <img id="srcPrev" alt="">
  </div>
  <div id="drOv">
    <div class="inn"><p>DROP IMAGE</p><div class="s">or click to select</div></div>
  </div>
  <div id="hiOv">

    <div class="sc">

      <button class="ab" onclick="togSrc()">SHOW SOURCE</button>

</div>
<input type="file" id="fIn" accept="image/*" style="display:none">
<script>
// ======================================================
// DENSITY FIELD v5
// CPU: density map at high resolution (anti-banding)
// GPU: render from density texture (fast, sharp)
// Color: generated from density, not from source
// Scale: proper axis with numbers
// ======================================================

var glCanvas, gl, scopeArea, glWrap, scaleCanvas, scaleCtx;
var srcImg = null;
var srcW = 0, srcH = 0;
var srcPixels = null;
var srcLum = null;
var srcR = null;
var srcG_ = null;
var srcB_ = null;

var densityTex = null;
var densityW = 0, densityH = 0;

var curMode = 0;
var showingSrc = false;
var renderScale = 2;
var quadBuf = null;
var programs = [];

var P = {
  gain:1.0, gamma:1.0, spread:2.0,
  intensity:1.0,
  emission:1.5, absorption:0.5,
  refraction:1.0, causticSharp:1.0,
  gridOp:0.2
};

// ===================== SHADERS =====================

var vsrc = 'attribute vec2 a_pos;varying vec2 v_uv;void main(){v_uv=a_pos*0.5+0.5;gl_Position=vec4(a_pos,0,1);}';

// Shared header: density texture RGBA = (avgR, avgG, avgB, density)
var fHead = [
  'precision highp float;',
  'varying vec2 v_uv;',
  'uniform sampler2D u_density;',
  'uniform float u_intensity;',
  'uniform float u_gridOp;',
  'uniform vec2 u_texSize;',
  '',
  '// Read density and color from texture',
  '// .rgb = average source color at this density position',
  '// .a   = normalized density (0-1)',
  'vec4 readDensity(vec2 uv) {',
  '  return texture2D(u_density, uv);',
  '}',
  ''
].join('\n');

// Mode 0: Classic
var frag0 = fHead + [
  'void main(){',
  '  vec4 dc = readDensity(v_uv);',
  '  float d = dc.a * u_intensity;',
  '  d = d / (d + 0.25);',
  '  vec3 col = dc.rgb * d;',
  '',
  '  if(u_gridOp > 0.001){',
  '    vec2 px = 1.0 / u_texSize;',
  '    float gx = smoothstep(1.0-px.x*1.5,1.0,fract(v_uv.x*10.0))*u_gridOp*0.4;',
  '    float gy = smoothstep(1.0-px.y*1.5,1.0,fract(v_uv.y*10.0))*u_gridOp*0.4;',
  '    col += vec3(gx+gy)*vec3(0.3,0.35,0.4);',
  '  }',
  '  gl_FragColor = vec4(col, 1.0);',
  '}'
].join('\n');

// Mode 1: Radiative Transfer — density as light-emitting medium
// Self-emission + absorption: dense regions glow, light fades through dense areas
var frag1 = fHead + [
  'uniform float u_emission;',
  'uniform float u_absorption;',
  '',
  'void main(){',
  '  vec2 px = 1.0 / u_texSize;',
  '  vec4 dc = readDensity(v_uv);',
  '  float d = dc.a;',
  '  vec3 srcCol = dc.rgb;',
  '',
  '  // Ray march vertically through the density field (simulating looking through medium)',
  '  // Sample a vertical column of neighbors to simulate optical depth',
  '  vec3 accumulated = vec3(0.0);',
  '  float transmittance = 1.0;',
  '  int steps = 16;',
  '',
  '  for(int i = -8; i <= 8; i++){',
  '    vec2 sampleUV = v_uv + vec2(0.0, float(i) * px.y * 2.0);',
  '    if(sampleUV.y < 0.0 || sampleUV.y > 1.0) continue;',
  '    vec4 sdc = readDensity(sampleUV);',
  '    float sd = sdc.a;',
  '',
  '    // Absorption: dense regions block light',
  '    float tau = sd * u_absorption * 0.3;',
  '    transmittance *= exp(-tau);',
  '',
  '    // Emission: dense regions emit light',
  '    vec3 emission = sdc.rgb * sd * sd * u_emission;',
  '    accumulated += emission * transmittance;',
  '  }',
  '',
  '  // Also add horizontal scattering',
  '  for(int i = -4; i <= 4; i++){',
  '    vec2 sampleUV = v_uv + vec2(float(i) * px.x * 3.0, 0.0);',
  '    if(sampleUV.x < 0.0 || sampleUV.x > 1.0) continue;',
  '    vec4 sdc = readDensity(sampleUV);',
  '    float sd = sdc.a;',
  '    accumulated += sdc.rgb * sd * u_emission * 0.15 * transmittance;',
  '  }',
  '',
  '  // Direct emission from this pixel',
  '  accumulated += srcCol * d * d * u_emission * u_intensity * 2.0;',
  '',
  '  // Tone map',
  '  accumulated = accumulated / (accumulated + vec3(0.4));',
  '  accumulated *= u_intensity;',
  '',
  '  vec3 col = accumulated;',
  '',
  '  if(u_gridOp>0.001){',
  '    float g=smoothstep(1.0-px.x*1.5,1.0,fract(v_uv.x*10.0))*u_gridOp*0.3',
  '         +smoothstep(1.0-px.y*1.5,1.0,fract(v_uv.y*10.0))*u_gridOp*0.3;',
  '    col+=vec3(g)*vec3(0.3,0.35,0.4);',
  '  }',
  '  gl_FragColor = vec4(col, 1.0);',
  '}'
].join('\n');

// Mode 2: Caustics — density as refracting surface, light concentration patterns
// Density gradient deflects light rays, creating bright concentration lines
var frag2 = fHead + [
  'uniform float u_refraction;',
  'uniform float u_causticSharp;',
  '',
  'void main(){',
  '  vec2 px = 1.0 / u_texSize;',
  '  vec4 dc = readDensity(v_uv);',
  '  float d = dc.a;',
  '',
  '  // Compute density gradient (acts as surface normal of refracting medium)',
  '  float dR = readDensity(v_uv+vec2(px.x,0)).a;',
  '  float dL = readDensity(v_uv-vec2(px.x,0)).a;',
  '  float dU = readDensity(v_uv-vec2(0,px.y)).a;',
  '  float dD = readDensity(v_uv+vec2(0,px.y)).a;',
  '  vec2 grad = vec2(dR-dL, dD-dU) * 0.5;',
  '',
  '  // Refracted UV: where does the light hitting this point come from?',
  '  vec2 refractedUV = v_uv - grad * u_refraction;',
  '  refractedUV = clamp(refractedUV, vec2(0.0), vec2(1.0));',
  '',
  '  // Sample density at refracted position',
  '  vec4 rdc = readDensity(refractedUV);',
  '',
  '  // Caustic intensity: light concentrates where Jacobian determinant is high',
  '  // Approximate via second derivatives (curvature of density field)',
  '  float d2x = dR + dL - 2.0 * d;',
  '  float d2y = dU + dD - 2.0 * d;',
  '  float dxy = (readDensity(v_uv+vec2(px.x,px.y)).a',
  '             + readDensity(v_uv-vec2(px.x,px.y)).a',
  '             - readDensity(v_uv+vec2(px.x,-px.y)).a',
  '             - readDensity(v_uv-vec2(px.x,-px.y)).a) * 0.25;',
  '',
  '  // Jacobian-based caustic: where curvature focuses light',
  '  float laplacian = abs(d2x + d2y);',
  '  float det = abs(d2x * d2y - dxy * dxy);',
  '  float caustic = laplacian * u_refraction * u_causticSharp;',
  '  caustic = pow(caustic, 1.5);',
  '  caustic = min(caustic, 5.0);',
  '',
  '  // Color: refracted source color modulated by caustic brightness',
  '  vec3 col = rdc.rgb * (rdc.a + caustic) * u_intensity;',
  '',
  '  // Add gradient-magnitude edge glow',
  '  float gradMag = length(grad);',
  '  col += dc.rgb * gradMag * u_intensity * 3.0;',
  '',
  '  // Tone map',
  '  col = col / (col + vec3(0.35));',
  '',
  '  if(u_gridOp>0.001){',
  '    float g=smoothstep(1.0-px.x*1.5,1.0,fract(v_uv.x*10.0))*u_gridOp*0.3',
  '         +smoothstep(1.0-px.y*1.5,1.0,fract(v_uv.y*10.0))*u_gridOp*0.3;',
  '    col+=vec3(g)*vec3(0.3,0.35,0.4);',
  '  }',
  '  gl_FragColor = vec4(col, 1.0);',
  '}'
].join('\n');

// ===================== GL SETUP =====================

function initGL() {
  glCanvas = document.getElementById('gl');
  scopeArea = document.getElementById('scopeArea');
  glWrap = document.getElementById('glWrap');
  scaleCanvas = document.getElementById('scaleCanvas');
  scaleCtx = scaleCanvas.getContext('2d');

  gl = glCanvas.getContext('webgl', {
    alpha:false, antialias:false, preserveDrawingBuffer:true, premultipliedAlpha:false
  });
  if (!gl) { alert('WebGL required'); return; }

  gl.getExtension('OES_texture_float');
  gl.getExtension('OES_texture_float_linear');

  quadBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

  programs[0] = mkProg(vsrc, frag0);
  programs[1] = mkProg(vsrc, frag1);
  programs[2] = mkProg(vsrc, frag2);

  fitCanvas();
  window.addEventListener('resize', function(){ fitCanvas(); if(srcLum) rebuildAndRender(); else render(); drawScale(); });
  setupIO();
  updateVis();
  render();
  drawScale();
}

function mkShader(type, src) {
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function mkProg(vs, fs) {
  var v = mkShader(gl.VERTEX_SHADER, vs);
  var f = mkShader(gl.FRAGMENT_SHADER, fs);
  if (!v || !f) return null;
  var p = gl.createProgram();
  gl.attachShader(p, v);
  gl.attachShader(p, f);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

function fitCanvas() {
  var rect = glWrap.getBoundingClientRect();
  var w = Math.round(rect.width);
  var h = Math.round(rect.height);
  var dpr = window.devicePixelRatio || 1;
  glCanvas.width = Math.round(w * dpr);
  glCanvas.height = Math.round(h * dpr);

  // Scale canvas covers entire scope area
  var sr = scopeArea.getBoundingClientRect();
  scaleCanvas.width = Math.round(sr.width * dpr);
  scaleCanvas.height = Math.round(sr.height * dpr);
  scaleCanvas.style.width = sr.width + 'px';
  scaleCanvas.style.height = sr.height + 'px';
}

// ===================== DENSITY MAP (CPU) =====================

function extractSource(img) {
  srcW = img.naturalWidth || img.width;
  srcH = img.naturalHeight || img.height;

  var tc = document.createElement('canvas');
  tc.width = srcW; tc.height = srcH;
  var tctx = tc.getContext('2d');
  tctx.drawImage(img, 0, 0);
  var id = tctx.getImageData(0, 0, srcW, srcH);
  srcPixels = id.data;

  var n = srcW * srcH;
  srcLum = new Float32Array(n);
  srcR = new Float32Array(n);
  srcG_ = new Float32Array(n);
  srcB_ = new Float32Array(n);
  for (var i = 0; i < n; i++) {
    var r = srcPixels[i*4] / 255.0;
    var g = srcPixels[i*4+1] / 255.0;
    var b = srcPixels[i*4+2] / 255.0;
    srcR[i] = r;
    srcG_[i] = g;
    srcB_[i] = b;
    srcLum[i] = 0.2126*r + 0.7152*g + 0.0722*b;
  }

  document.getElementById('srcPrev').src = tc.toDataURL();
}

function buildDensity() {
  if (!srcLum) return;

  var gain = P.gain;
  var gamma = P.gamma;
  var spread = P.spread;

  densityW = glCanvas.width;
  densityH = glCanvas.height;

  // Limit for performance (M3 can handle 4096 easily)
  var maxPreviewDim = 4096;
  if (densityW > maxPreviewDim) {
    var s = maxPreviewDim / densityW;
    densityW = maxPreviewDim;
    densityH = Math.round(densityH * s);
  }
  if (densityH > maxPreviewDim) {
    var s = maxPreviewDim / densityH;
    densityH = maxPreviewDim;
    densityW = Math.round(densityW * s);
  }

  // Accumulation height: x8 for anti-banding
  var AH = densityH * 8;
  // 4 channels: R, G, B, total density
  var accumR = new Float32Array(densityW * AH);
  var accumG = new Float32Array(densityW * AH);
  var accumB = new Float32Array(densityW * AH);
  var accumD = new Float32Array(densityW * AH);

  // Gaussian kernel
  var sigma = spread * (AH / densityH);
  var kRad = Math.min(Math.ceil(sigma * 3), 20);
  var kern = new Float32Array(kRad * 2 + 1);
  var kSum = 0;
  for (var k = -kRad; k <= kRad; k++) {
    var w = Math.exp(-(k*k) / (2*sigma*sigma));
    kern[k + kRad] = w;
    kSum += w;
  }
  for (var k = 0; k < kern.length; k++) kern[k] /= kSum;

  var colScale = densityW / srcW;

  for (var sx = 0; sx < srcW; sx++) {
    var ox0 = Math.floor(sx * colScale);
    var ox1 = Math.ceil((sx + 1) * colScale);
    if (ox1 > densityW) ox1 = densityW;

    for (var sy = 0; sy < srcH; sy++) {
      var idx = sy * srcW + sx;
      var lum = srcLum[idx] * gain;
      if (lum > 1.0) lum = 1.0;
      lum = Math.pow(lum, gamma);

      // Source pixel color
      var pr = srcR[idx];
      var pg = srcG_[idx];
      var pb = srcB_[idx];

      // HIGH luminance = TOP of scope (low Y value)
      var mappedY = lum * (AH - 1);
      var baseY = Math.round(mappedY);

      for (var ox = ox0; ox < ox1; ox++) {
        var base = ox * AH;
        for (var k = 0; k < kern.length; k++) {
          var ky = baseY + k - kRad;
          if (ky >= 0 && ky < AH) {
            var kv = kern[k];
            accumR[base + ky] += pr * kv;
            accumG[base + ky] += pg * kv;
            accumB[base + ky] += pb * kv;
            accumD[base + ky] += kv;
          }
        }
      }
    }
  }

  // Downsample AH -> densityH, store as RGBA
  var texData = new Float32Array(densityW * densityH * 4);
  var binH = AH / densityH;

  // Find max density for normalization
  var maxD = 0;

  for (var ox = 0; ox < densityW; ox++) {
    var aBase = ox * AH;
    for (var oy = 0; oy < densityH; oy++) {
      var y0 = oy * binH;
      var y1 = y0 + binH;
      var iy0 = Math.floor(y0);
      var iy1 = Math.ceil(y1);
      if (iy1 > AH) iy1 = AH;
      var sR = 0, sG = 0, sB = 0, sD = 0;
      for (var ay = iy0; ay < iy1; ay++) {
        var lo = ay < y0 ? y0 : ay;
        var hi = (ay+1) > y1 ? y1 : (ay+1);
        if (hi > lo) {
          var w = hi - lo;
          sR += accumR[aBase + ay] * w;
          sG += accumG[aBase + ay] * w;
          sB += accumB[aBase + ay] * w;
          sD += accumD[aBase + ay] * w;
        }
      }
      sR /= binH; sG /= binH; sB /= binH; sD /= binH;

      var pi = (oy * densityW + ox) * 4;
      texData[pi]   = sR;
      texData[pi+1] = sG;
      texData[pi+2] = sB;
      texData[pi+3] = sD;

      if (sD > maxD) maxD = sD;
    }
  }

  // Normalize: scale so max density = 1, color = average color at that density
  if (maxD > 0) {
    var inv = 1.0 / maxD;
    for (var i = 0; i < densityW * densityH; i++) {
      var pi = i * 4;
      var d = texData[pi+3];
      if (d > 0.0001) {
        // Average color = accumulated color / density count
        texData[pi]   = texData[pi]   / d;  // avg R
        texData[pi+1] = texData[pi+1] / d;  // avg G
        texData[pi+2] = texData[pi+2] / d;  // avg B
      }
      texData[pi+3] = d * inv;  // normalized density
    }
  }

  uploadDensity(texData);
}

function uploadDensity(texData) {
  if (!densityTex) densityTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, densityTex);

  var useFloat = false;
  // Try float texture with proper GL error check
  gl.getError(); // clear previous errors
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, densityW, densityH, 0, gl.RGBA, gl.FLOAT, texData);
  if (gl.getError() === gl.NO_ERROR) {
    useFloat = true;
  } else {
    // Fallback: encode to UNSIGNED_BYTE (loses precision but works everywhere)
    var bytes = new Uint8Array(densityW * densityH * 4);
    for (var i = 0; i < densityW * densityH; i++) {
      bytes[i*4]   = Math.min(255, Math.round(texData[i*4]   * 255));
      bytes[i*4+1] = Math.min(255, Math.round(texData[i*4+1] * 255));
      bytes[i*4+2] = Math.min(255, Math.round(texData[i*4+2] * 255));
      bytes[i*4+3] = Math.min(255, Math.round(texData[i*4+3] * 255));
    }
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, densityW, densityH, 0, gl.RGBA, gl.UNSIGNED_BYTE, bytes);
  }

  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

  document.getElementById('stB').textContent =
    'DENSITY: ' + densityW + 'x' + densityH +
    ' | TEX: ' + (useFloat ? 'FLOAT32' : 'UINT8') +
    ' | DPR: ' + (window.devicePixelRatio || 1);
}

// ===================== RENDER =====================

function render() {
  var w = glCanvas.width;
  var h = glCanvas.height;
  gl.viewport(0, 0, w, h);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  if (!densityTex || !srcLum) return;

  var prog = programs[curMode];
  if (!prog) return;

  gl.useProgram(prog);

  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, densityTex);
  gl.uniform1i(gl.getUniformLocation(prog, 'u_density'), 0);

  gl.uniform1f(gl.getUniformLocation(prog, 'u_intensity'), P.intensity);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_gridOp'), P.gridOp);
  gl.uniform2f(gl.getUniformLocation(prog, 'u_texSize'), densityW, densityH);

  if (curMode === 1) {
    gl.uniform1f(gl.getUniformLocation(prog, 'u_emission'), P.emission);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_absorption'), P.absorption);
  }
  if (curMode === 2) {
    gl.uniform1f(gl.getUniformLocation(prog, 'u_refraction'), P.refraction);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_causticSharp'), P.causticSharp);
  }

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function rebuildAndRender() {
  buildDensity();
  render();
  drawScale();
}

// ===================== SCALE DRAWING =====================

function drawScale() {
  var dpr = window.devicePixelRatio || 1;
  var cw = scaleCanvas.width;
  var ch = scaleCanvas.height;
  var ctx = scaleCtx;
  ctx.clearRect(0, 0, cw, ch);

  // Get GL canvas position relative to scope area
  var scopeRect = scopeArea.getBoundingClientRect();
  var glRect = glWrap.getBoundingClientRect();
  var ox = (glRect.left - scopeRect.left) * dpr;
  var oy = (glRect.top - scopeRect.top) * dpr;
  var gw = glRect.width * dpr;
  var gh = glRect.height * dpr;

  ctx.strokeStyle = '#222';
  ctx.lineWidth = dpr;
  ctx.fillStyle = '#333';
  ctx.font = (8 * dpr) + 'px Courier New';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'right';

  // Y axis: 0 (bottom) to 1023 (top) - 10-bit luminance scale
  var ySteps = 10;
  for (var i = 0; i <= ySteps; i++) {
    var frac = i / ySteps;
    var y = oy + gh - frac * gh;
    var label = Math.round(frac * 1023);

    // Tick mark
    ctx.beginPath();
    ctx.moveTo(ox - 4 * dpr, y);
    ctx.lineTo(ox, y);
    ctx.stroke();

    // Label
    ctx.fillText(label, ox - 6 * dpr, y);

    // Grid line (subtle)
    if (i > 0 && i < ySteps) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.beginPath();
      ctx.moveTo(ox, y);
      ctx.lineTo(ox + gw, y);
      ctx.stroke();
      ctx.restore();
    }
  }

  // X axis: column position 0% to 100%
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  var xSteps = 10;
  for (var i = 0; i <= xSteps; i++) {
    var frac = i / xSteps;
    var x = ox + frac * gw;
    var label = Math.round(frac * 100);

    ctx.beginPath();
    ctx.moveTo(x, oy + gh);
    ctx.lineTo(x, oy + gh + 4 * dpr);
    ctx.stroke();

    ctx.fillText(label, x, oy + gh + 5 * dpr);

    if (i > 0 && i < xSteps) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.beginPath();
      ctx.moveTo(x, oy);
      ctx.lineTo(x, oy + gh);
      ctx.stroke();
      ctx.restore();
    }
  }

  // Border
  ctx.strokeStyle = '#1a1a1a';
  ctx.strokeRect(ox, oy, gw, gh);

  // Y axis label
  ctx.save();
  ctx.fillStyle = '#222';
  ctx.font = (7 * dpr) + 'px Courier New';
  ctx.translate(8 * dpr, oy + gh / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('LUMINANCE LEVEL', 0, 0);
  ctx.restore();

  // X axis label
  ctx.fillStyle = '#222';
  ctx.font = (7 * dpr) + 'px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('COLUMN %', ox + gw / 2, oy + gh + 16 * dpr);
}

// ===================== HI-RES =====================

function renderHi() {
  if (!srcLum) return;

  var scale = renderScale;
  var outW = Math.min(srcW * scale, 8192);
  var outH = Math.min(srcH * scale, 8192);

  var maxSize = gl.getParameter(gl.MAX_VIEWPORT_DIMS);
  outW = Math.min(outW, maxSize[0]);
  outH = Math.min(outH, maxSize[1]);

  // Build density at hi-res
  var oldDW = densityW, oldDH = densityH;
  densityW = outW;
  densityH = outH;

  document.getElementById('hI').textContent = 'RENDERING ' + outW + 'x' + outH + '...';

  setTimeout(function() {
    buildDensity();

    var oldW = glCanvas.width;
    var oldH = glCanvas.height;
    glCanvas.width = outW;
    glCanvas.height = outH;
    render();

    var dataURL = glCanvas.toDataURL('image/png');

    // Restore
    glCanvas.width = oldW;
    glCanvas.height = oldH;
    densityW = oldDW;
    densityH = oldDH;
    buildDensity();
    render();

    document.getElementById('hiImg').src = dataURL;
    document.getElementById('hiOv').classList.add('show');
    window._hiData = dataURL;
    document.getElementById('hI').textContent = 'HI-RES: ' + outW + 'x' + outH;
  }, 50);
}

function closeHi() { document.getElementById('hiOv').classList.remove('show'); }

// ===================== IMAGE =====================

function processImg(img) {
  srcImg = img;
  extractSource(img);
  fitCanvas();
  rebuildAndRender();
  document.getElementById('drOv').classList.add('hidden');
  document.getElementById('hI').textContent = srcW + 'x' + srcH;
}

function loadImg() { document.getElementById('fIn').click(); }

function setupIO() {
  document.getElementById('fIn').addEventListener('change', function(e) {
    var f = e.target.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function(ev) {
      var img = new Image();
      img.onload = function() { processImg(img); };
      img.src = ev.target.result;
    };
    r.readAsDataURL(f);
  });
  document.getElementById('drOv').addEventListener('click', function() { loadImg(); });
  document.getElementById('main').addEventListener('dragover', function(e) { e.preventDefault(); });
  document.getElementById('main').addEventListener('drop', function(e) {
    e.preventDefault();
    var f = e.dataTransfer.files[0];
    if (!f || !f.type.match('image.*')) return;
    var r = new FileReader();
    r.onload = function(ev) {
      var img = new Image();
      img.onload = function() { processImg(img); };
      img.src = ev.target.result;
    };
    r.readAsDataURL(f);
  });
  document.getElementById('hiOv').addEventListener('click', function(e) {
    if (e.target === this || e.target === document.getElementById('hiImg')) closeHi();
  });
}

// ===================== UI =====================

function setM(m) {
  curMode = m;
  for (var i = 0; i < 3; i++) document.getElementById('m'+i).classList.remove('a');
  document.getElementById('m'+m).classList.add('a');
  updateVis();
  render();
}

function updateVis() {
  document.getElementById('rAb').style.display = curMode===1?'':'none';
  document.getElementById('rEm').style.display = curMode===1?'':'none';
  document.getElementById('rRf').style.display = curMode===2?'':'none';
  document.getElementById('rFc').style.display = curMode===2?'':'none';
}

function onP(rebuild) {
  P.gain = parseFloat(document.getElementById('sG').value);
  P.gamma = parseFloat(document.getElementById('sGm').value);
  P.spread = parseFloat(document.getElementById('sSp').value);
  P.intensity = parseFloat(document.getElementById('sIn').value);
  P.absorption = parseFloat(document.getElementById('sAb').value);
  P.emission = parseFloat(document.getElementById('sEm').value);
  P.refraction = parseFloat(document.getElementById('sRf').value);
  P.causticSharp = parseFloat(document.getElementById('sFc').value);
  P.gridOp = parseFloat(document.getElementById('sGr').value);

  document.getElementById('vG').textContent = P.gain.toFixed(2);
  document.getElementById('vGm').textContent = P.gamma.toFixed(2);
  document.getElementById('vSp').textContent = P.spread.toFixed(1);
  document.getElementById('vIn').textContent = P.intensity.toFixed(2);
  document.getElementById('vAb').textContent = P.absorption.toFixed(2);
  document.getElementById('vEm').textContent = P.emission.toFixed(2);
  document.getElementById('vRf').textContent = P.refraction.toFixed(2);
  document.getElementById('vFc').textContent = P.causticSharp.toFixed(2);
  document.getElementById('vGr').textContent = P.gridOp.toFixed(2);

  if (rebuild && srcLum) rebuildAndRender();
  else render();
}

function onRs() {
  renderScale = parseInt(document.getElementById('sRs').value);
  document.getElementById('vRs').textContent = renderScale + 'x';
}

function togPnl() {
  document.getElementById('pnl').classList.toggle('collapsed');
  document.getElementById('togB').classList.toggle('shifted');
  document.getElementById('scopeArea').classList.toggle('full');
  setTimeout(function(){ fitCanvas(); if(srcLum) rebuildAndRender(); drawScale(); }, 250);
}

function togSrc() {
  showingSrc = !showingSrc;
  var el = document.getElementById('srcPrev');
  if (showingSrc && srcImg) el.classList.add('show');
  else { el.classList.remove('show'); showingSrc = false; }
}

function savePng() {
  var url = window._hiData || glCanvas.toDataURL('image/png');
  var a = document.createElement('a');
  a.href = url; a.download = 'density-field-' + Date.now() + '.png'; a.click();
}

window.addEventListener('DOMContentLoaded', initGL);
</script>
