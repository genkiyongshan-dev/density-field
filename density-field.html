<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DENSITY FIELD</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  background: #0a0a0a;
  color: #c0c0c0;
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}
.app {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100dvh;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
  min-height: 30px;
}
.header-title {
  font-size: 10px;
  letter-spacing: 3px;
  color: #505050;
}
.header-info {
  font-size: 9px;
  color: #383838;
  letter-spacing: 1px;
}

/* Canvas area - reduced to give controls more room */
.canvas-wrap {
  flex: 1;
  min-height: 0;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #050505;
}
.canvas-wrap canvas { display: block; }
.source-preview {
  position: absolute;
  top: 6px; right: 6px;
  max-width: 56px; max-height: 56px;
  border: 1px solid #1e1e1e;
  opacity: 0.5;
  display: none;
  pointer-events: none;
}
.empty-state {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: #252525;
}
.empty-state .icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }
.empty-state .label { font-size: 9px; letter-spacing: 3px; }

/* Controls - more spacious */
.controls {
  flex-shrink: 0;
  padding: 12px 12px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  border-top: 1px solid #1a1a1a;
  background: #0c0c0c;
}
.cr {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.cl {
  font-size: 8px;
  letter-spacing: 1.5px;
  color: #444;
  min-width: 42px;
  text-align: right;
}
.cv {
  font-size: 8px;
  color: #555;
  min-width: 32px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 1px;
  background: #222;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: #181818;
  border: 1px solid #3a3a3a;
}
.color-section {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 10px;
}
.color-section .cl { min-width: 42px; }
.color-ch {
  display: flex; align-items: center; gap: 3px; flex: 1;
}
.color-ch-label {
  font-size: 7px; letter-spacing: 1px; min-width: 8px; text-align: center;
}
.color-ch-r { color: #775555; }
.color-ch-g { color: #557755; }
.color-ch-b { color: #555577; }

/* Mode toggle */
.mode-row {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
  align-items: center;
}
.mode-label {
  font-size: 8px;
  letter-spacing: 1.5px;
  color: #444;
  min-width: 42px;
  text-align: right;
}
.mode-btn {
  padding: 5px 10px;
  background: #111;
  border: 1px solid #1e1e1e;
  color: #444;
  font-family: 'Courier New', Courier, monospace;
  font-size: 7px;
  letter-spacing: 1.5px;
  cursor: pointer;
}
.mode-btn.active {
  border-color: #3a3a3a;
  color: #888;
  background: #1a1a1a;
}

.btn-row {
  display: flex;
  gap: 5px;
}
.btn {
  flex: 1;
  padding: 10px 0;
  background: #111;
  border: 1px solid #1e1e1e;
  color: #555;
  font-family: 'Courier New', Courier, monospace;
  font-size: 8px;
  letter-spacing: 2px;
  text-align: center;
  cursor: pointer;
}
.btn:active { background: #1a1a1a; color: #888; }
.btn-primary { border-color: #2a2a2a; color: #777; }
#fileInput { display: none; }
.grid-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-title">DENSITY FIELD</span>
    <span class="header-info" id="imgInfo">NO IMAGE</span>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="glCanvas"></canvas>
    <canvas class="grid-overlay" id="gridCanvas"></canvas>
    <img class="source-preview" id="srcPreview" alt="">
    <div class="empty-state" id="emptyState">
      <div class="icon">&#9674;</div>
      <div class="label">SELECT PHOTO</div>
    </div>
  </div>
  <div class="controls">
    <div class="mode-row">
      <span class="mode-label">MODE</span>
      <button class="mode-btn active" id="mPoints">POINTS</button>
      <button class="mode-btn" id="mLines">LINES</button>
    </div>
    <div class="cr">
      <span class="cl">GAMMA</span>
      <input type="range" id="sGamma" min="0.2" max="3.0" step="0.05" value="1.0">
      <span class="cv" id="vGamma">1.00</span>
    </div>
    <div class="cr">
      <span class="cl">WEIGHT</span>
      <input type="range" id="sWeight" min="0.001" max="0.12" step="0.001" value="0.018">
      <span class="cv" id="vWeight">0.018</span>
    </div>
    <div class="cr">
      <span class="cl">SIZE</span>
      <input type="range" id="sSize" min="0.2" max="3.0" step="0.1" value="0.8">
      <span class="cv" id="vSize">0.8</span>
    </div>
    <div class="cr">
      <span class="cl">SUBDIV</span>
      <input type="range" id="sSubdiv" min="1" max="4" step="1" value="1">
      <span class="cv" id="vSubdiv">1</span>
    </div>
    <div class="color-section">
      <span class="cl">COLOR</span>
      <div class="color-ch">
        <span class="color-ch-label color-ch-r">R</span>
        <input type="range" id="sR" min="0" max="2.0" step="0.05" value="1.0">
      </div>
      <div class="color-ch">
        <span class="color-ch-label color-ch-g">G</span>
        <input type="range" id="sG" min="0" max="2.0" step="0.05" value="1.0">
      </div>
      <div class="color-ch">
        <span class="color-ch-label color-ch-b">B</span>
        <input type="range" id="sB" min="0" max="2.0" step="0.05" value="1.0">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnPhoto">PHOTO</button>
      <button class="btn" id="btnSave">SAVE PNG</button>
    </div>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*">

<script>
(function() {
  "use strict";

  /* ---- DOM ---- */
  var glCanvas   = document.getElementById("glCanvas");
  var gridCanvas = document.getElementById("gridCanvas");
  var canvasWrap = document.getElementById("canvasWrap");
  var emptyState = document.getElementById("emptyState");
  var srcPreview = document.getElementById("srcPreview");
  var imgInfo    = document.getElementById("imgInfo");
  var fileInput  = document.getElementById("fileInput");
  var btnPhoto   = document.getElementById("btnPhoto");
  var btnSave    = document.getElementById("btnSave");

  var sGamma  = document.getElementById("sGamma");
  var vGamma  = document.getElementById("vGamma");
  var sWeight = document.getElementById("sWeight");
  var vWeight = document.getElementById("vWeight");
  var sSize   = document.getElementById("sSize");
  var vSize   = document.getElementById("vSize");
  var sSubdiv = document.getElementById("sSubdiv");
  var vSubdiv = document.getElementById("vSubdiv");
  var sR = document.getElementById("sR");
  var sG = document.getElementById("sG");
  var sB = document.getElementById("sB");
  var mPoints = document.getElementById("mPoints");
  var mLines  = document.getElementById("mLines");

  /* ---- State ---- */
  var sourceData = null;
  var sourceW = 0, sourceH = 0;
  var gl = null, progPoints = null, progLines = null;
  var pointsBuf = null, linesBuf = null;
  var pointsCount = 0, linesCount = 0;
  var dispW = 0, dispH = 0;
  var needRebuild = true;
  var rafId = null;
  var drawMode = "points"; /* "points" or "lines" */

  /* ---- Params ---- */
  var gamma = 1.0, weight = 0.018, ptSize = 0.8;
  var subdivLevel = 1;
  var colorR = 1.0, colorG = 1.0, colorB = 1.0;

  /* ---- Uniform locs ---- */
  var uPS_p = null, uW_p = null, uC_p = null;
  var uW_l = null, uC_l = null;

  /* ---- Mode toggle ---- */
  mPoints.onclick = function() {
    drawMode = "points";
    mPoints.className = "mode-btn active";
    mLines.className = "mode-btn";
    scheduleFrame();
  };
  mLines.onclick = function() {
    drawMode = "lines";
    mLines.className = "mode-btn active";
    mPoints.className = "mode-btn";
    scheduleFrame();
  };

  /* ---- Slider wiring ---- */
  sGamma.oninput = function() {
    gamma = parseFloat(this.value);
    vGamma.textContent = gamma.toFixed(2);
    needRebuild = true;
    scheduleFrame();
  };
  sWeight.oninput = function() {
    weight = parseFloat(this.value);
    vWeight.textContent = weight.toFixed(3);
    scheduleFrame();
  };
  sSize.oninput = function() {
    ptSize = parseFloat(this.value);
    vSize.textContent = ptSize.toFixed(1);
    scheduleFrame();
  };
  sSubdiv.oninput = function() {
    subdivLevel = parseInt(this.value);
    vSubdiv.textContent = subdivLevel.toString();
    needRebuild = true;
    scheduleFrame();
  };
  sR.oninput = function() { colorR = parseFloat(this.value); scheduleFrame(); };
  sG.oninput = function() { colorG = parseFloat(this.value); scheduleFrame(); };
  sB.oninput = function() { colorB = parseFloat(this.value); scheduleFrame(); };

  function scheduleFrame() {
    if (rafId !== null) return;
    rafId = requestAnimationFrame(function() {
      rafId = null;
      if (!sourceData) return;
      if (needRebuild) {
        needRebuild = false;
        buildVertices();
      }
      render();
    });
  }

  /* ---- Photo ---- */
  btnPhoto.onclick = function() { fileInput.click(); };
  fileInput.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() { loadSource(img); };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  function loadSource(img) {
    sourceW = img.naturalWidth;
    sourceH = img.naturalHeight;
    var oc = document.createElement("canvas");
    oc.width = sourceW; oc.height = sourceH;
    var ctx = oc.getContext("2d");
    ctx.drawImage(img, 0, 0);
    sourceData = ctx.getImageData(0, 0, sourceW, sourceH);
    srcPreview.src = oc.toDataURL();
    srcPreview.style.display = "block";
    emptyState.style.display = "none";
    imgInfo.textContent = sourceW + "\u00d7" + sourceH;
    needRebuild = true;
    setupCanvas();
    buildVertices();
    render();
    drawGrid();
  }

  /* ---- Canvas sizing ---- */
  function setupCanvas() {
    if (!sourceData) return;
    if (!gl && !initGL()) return;
    var dpr = window.devicePixelRatio || 1;
    var wW = canvasWrap.clientWidth;
    var wH = canvasWrap.clientHeight;
    var srcA = sourceW / sourceH;
    var wA = wW / wH;
    if (srcA > wA) {
      dispW = wW;
      dispH = Math.round(wW / srcA);
    } else {
      dispH = wH;
      dispW = Math.round(wH * srcA);
    }
    var cW = Math.round(dispW * dpr);
    var cH = Math.round(dispH * dpr);
    glCanvas.width = cW;
    glCanvas.height = cH;
    glCanvas.style.width = dispW + "px";
    glCanvas.style.height = dispH + "px";
    gl.viewport(0, 0, cW, cH);
  }

  /* ---- WebGL init ---- */
  function initGL() {
    gl = glCanvas.getContext("webgl", {
      alpha: false,
      antialias: true,
      premultipliedAlpha: false,
      preserveDrawingBuffer: true
    });
    if (!gl) { alert("WebGL unavailable"); return false; }

    /* --- Points program --- */
    var vsP = [
      "attribute vec2 a_pos;",
      "attribute vec3 a_rgb;",
      "uniform float u_ps;",
      "uniform float u_w;",
      "uniform vec3 u_cm;",
      "varying vec4 v_col;",
      "void main() {",
      "  gl_Position = vec4(a_pos * 2.0 - 1.0, 0.0, 1.0);",
      "  gl_PointSize = u_ps;",
      "  v_col = vec4(a_rgb * u_cm, u_w);",
      "}"
    ].join("\n");

    var fsP = [
      "precision mediump float;",
      "varying vec4 v_col;",
      "void main() { gl_FragColor = v_col; }"
    ].join("\n");

    /* --- Lines program --- */
    var vsL = [
      "attribute vec2 a_pos;",
      "attribute vec3 a_rgb;",
      "uniform float u_w;",
      "uniform vec3 u_cm;",
      "varying vec4 v_col;",
      "void main() {",
      "  gl_Position = vec4(a_pos * 2.0 - 1.0, 0.0, 1.0);",
      "  v_col = vec4(a_rgb * u_cm, u_w);",
      "}"
    ].join("\n");

    var fsL = fsP; /* same fragment shader */

    function mk(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }
    function mkProg(vSrc, fSrc) {
      var p = gl.createProgram();
      gl.attachShader(p, mk(gl.VERTEX_SHADER, vSrc));
      gl.attachShader(p, mk(gl.FRAGMENT_SHADER, fSrc));
      gl.linkProgram(p);
      return p;
    }

    progPoints = mkProg(vsP, fsP);
    progLines  = mkProg(vsL, fsL);

    gl.useProgram(progPoints);
    uPS_p = gl.getUniformLocation(progPoints, "u_ps");
    uW_p  = gl.getUniformLocation(progPoints, "u_w");
    uC_p  = gl.getUniformLocation(progPoints, "u_cm");

    gl.useProgram(progLines);
    uW_l = gl.getUniformLocation(progLines, "u_w");
    uC_l = gl.getUniformLocation(progLines, "u_cm");

    pointsBuf = gl.createBuffer();
    linesBuf  = gl.createBuffer();
    return true;
  }

  /* ---- Helper: get luminance at (row, col) with boundary clamp ---- */
  function getLum(px, row, col) {
    if (row < 0) row = 0;
    if (row >= sourceH) row = sourceH - 1;
    if (col < 0) col = 0;
    if (col >= sourceW) col = sourceW - 1;
    var pi = (row * sourceW + col) * 4;
    var r = px[pi] / 255.0;
    var g = px[pi + 1] / 255.0;
    var b = px[pi + 2] / 255.0;
    return 0.2126 * r + 0.7152 * g + 0.0722 * b;
  }

  function getRGB(px, row, col) {
    if (row < 0) row = 0;
    if (row >= sourceH) row = sourceH - 1;
    if (col < 0) col = 0;
    if (col >= sourceW) col = sourceW - 1;
    var pi = (row * sourceW + col) * 4;
    return [px[pi] / 255.0, px[pi + 1] / 255.0, px[pi + 2] / 255.0];
  }

  /* ---- Catmull-Rom interpolation ---- */
  function catmullRom(p0, p1, p2, p3, t) {
    var t2 = t * t;
    var t3 = t2 * t;
    return 0.5 * (
      (2.0 * p1) +
      (-p0 + p2) * t +
      (2.0 * p0 - 5.0 * p1 + 4.0 * p2 - p3) * t2 +
      (-p0 + 3.0 * p1 - 3.0 * p2 + p3) * t3
    );
  }

  /* ---- Build vertices ---- */
  function buildVertices() {
    if (!sourceData || !gl) return;
    var px = sourceData.data;
    var invG = 1.0 / gamma;
    var sub = subdivLevel; /* 1=original rows only, 2=1 interp between each, etc */

    /* Total rows after subdivision */
    var totalRows = (sourceH - 1) * sub + 1;

    /* --- POINTS buffer --- */
    var pArr = new Float32Array(totalRows * sourceW * 5);
    var pIdx = 0;

    for (var ri = 0; ri < totalRows; ri++) {
      var srcRowF = ri / sub;  /* fractional source row */
      var srcRow0 = Math.floor(srcRowF);
      var frac = srcRowF - srcRow0;

      for (var col = 0; col < sourceW; col++) {
        var lum, r, g, b;

        if (frac < 0.001) {
          /* Exact source row */
          lum = getLum(px, srcRow0, col);
          var rgb = getRGB(px, srcRow0, col);
          r = rgb[0]; g = rgb[1]; b = rgb[2];
        } else {
          /* Catmull-Rom interpolation across rows */
          var r0 = srcRow0 - 1;
          var r1 = srcRow0;
          var r2 = srcRow0 + 1;
          var r3 = srcRow0 + 2;

          var l0 = getLum(px, r0, col);
          var l1 = getLum(px, r1, col);
          var l2 = getLum(px, r2, col);
          var l3 = getLum(px, r3, col);
          lum = catmullRom(l0, l1, l2, l3, frac);
          if (lum < 0) lum = 0;
          if (lum > 1) lum = 1;

          /* Interpolate color too */
          var c0 = getRGB(px, r0, col);
          var c1 = getRGB(px, r1, col);
          var c2 = getRGB(px, r2, col);
          var c3 = getRGB(px, r3, col);
          r = catmullRom(c0[0], c1[0], c2[0], c3[0], frac);
          g = catmullRom(c0[1], c1[1], c2[1], c3[1], frac);
          b = catmullRom(c0[2], c1[2], c2[2], c3[2], frac);
          if (r < 0) r = 0; if (r > 1) r = 1;
          if (g < 0) g = 0; if (g > 1) g = 1;
          if (b < 0) b = 0; if (b > 1) b = 1;
        }

        var lumG = Math.pow(lum, invG);
        pArr[pIdx]     = (col + 0.5) / sourceW;
        pArr[pIdx + 1] = lumG;
        pArr[pIdx + 2] = r;
        pArr[pIdx + 3] = g;
        pArr[pIdx + 4] = b;
        pIdx += 5;
      }
    }
    pointsCount = totalRows * sourceW;

    gl.bindBuffer(gl.ARRAY_BUFFER, pointsBuf);
    gl.bufferData(gl.ARRAY_BUFFER, pArr, gl.STATIC_DRAW);

    /* --- LINES buffer: connect adjacent columns within each row --- */
    /* Each line segment = 2 vertices, each vertex = 5 floats */
    var lArr = new Float32Array(totalRows * (sourceW - 1) * 2 * 5);
    var lIdx = 0;

    for (var ri2 = 0; ri2 < totalRows; ri2++) {
      var base = ri2 * sourceW * 5;
      for (var c = 0; c < sourceW - 1; c++) {
        var off0 = base + c * 5;
        var off1 = base + (c + 1) * 5;
        /* vertex 0 */
        lArr[lIdx]     = pArr[off0];
        lArr[lIdx + 1] = pArr[off0 + 1];
        lArr[lIdx + 2] = pArr[off0 + 2];
        lArr[lIdx + 3] = pArr[off0 + 3];
        lArr[lIdx + 4] = pArr[off0 + 4];
        lIdx += 5;
        /* vertex 1 */
        lArr[lIdx]     = pArr[off1];
        lArr[lIdx + 1] = pArr[off1 + 1];
        lArr[lIdx + 2] = pArr[off1 + 2];
        lArr[lIdx + 3] = pArr[off1 + 3];
        lArr[lIdx + 4] = pArr[off1 + 4];
        lIdx += 5;
      }
    }
    linesCount = totalRows * (sourceW - 1) * 2;

    gl.bindBuffer(gl.ARRAY_BUFFER, linesBuf);
    gl.bufferData(gl.ARRAY_BUFFER, lArr, gl.STATIC_DRAW);
  }

  /* ---- Render ---- */
  function render() {
    if (!gl || pointsCount === 0) return;

    gl.clearColor(0.0, 0.0, 0.0, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

    var dpr = window.devicePixelRatio || 1;

    if (drawMode === "points") {
      gl.useProgram(progPoints);
      gl.uniform1f(uPS_p, ptSize * dpr);
      gl.uniform1f(uW_p, weight);
      gl.uniform3f(uC_p, colorR, colorG, colorB);

      gl.bindBuffer(gl.ARRAY_BUFFER, pointsBuf);
      var aP = gl.getAttribLocation(progPoints, "a_pos");
      var aC = gl.getAttribLocation(progPoints, "a_rgb");
      gl.enableVertexAttribArray(aP);
      gl.vertexAttribPointer(aP, 2, gl.FLOAT, false, 20, 0);
      gl.enableVertexAttribArray(aC);
      gl.vertexAttribPointer(aC, 3, gl.FLOAT, false, 20, 8);
      gl.drawArrays(gl.POINTS, 0, pointsCount);
      gl.disableVertexAttribArray(aP);
      gl.disableVertexAttribArray(aC);

    } else {
      /* LINES mode */
      gl.useProgram(progLines);
      gl.uniform1f(uW_l, weight);
      gl.uniform3f(uC_l, colorR, colorG, colorB);

      gl.bindBuffer(gl.ARRAY_BUFFER, linesBuf);
      var aP2 = gl.getAttribLocation(progLines, "a_pos");
      var aC2 = gl.getAttribLocation(progLines, "a_rgb");
      gl.enableVertexAttribArray(aP2);
      gl.vertexAttribPointer(aP2, 2, gl.FLOAT, false, 20, 0);
      gl.enableVertexAttribArray(aC2);
      gl.vertexAttribPointer(aC2, 3, gl.FLOAT, false, 20, 8);
      gl.drawArrays(gl.LINES, 0, linesCount);
      gl.disableVertexAttribArray(aP2);
      gl.disableVertexAttribArray(aC2);
    }
  }

  /* ---- Grid ---- */
  function drawGrid() {
    if (!dispW || !dispH) return;
    var dpr = window.devicePixelRatio || 1;
    gridCanvas.width = Math.round(dispW * dpr);
    gridCanvas.height = Math.round(dispH * dpr);
    gridCanvas.style.width = dispW + "px";
    gridCanvas.style.height = dispH + "px";
    gridCanvas.style.position = "absolute";
    var wr = canvasWrap.getBoundingClientRect();
    var gr = glCanvas.getBoundingClientRect();
    gridCanvas.style.left = (gr.left - wr.left) + "px";
    gridCanvas.style.top = (gr.top - wr.top) + "px";

    var ctx = gridCanvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, dispW, dispH);

    var steps = [0, 128, 256, 384, 512, 640, 768, 896, 1023];
    ctx.strokeStyle = "rgba(255,255,255,0.04)";
    ctx.lineWidth = 0.5;
    ctx.fillStyle = "rgba(255,255,255,0.10)";
    ctx.font = "7px 'Courier New', monospace";
    ctx.textBaseline = "middle";
    for (var i = 0; i < steps.length; i++) {
      var v = steps[i];
      var y = dispH - (v / 1023.0) * dispH;
      ctx.beginPath();
      ctx.moveTo(26, y);
      ctx.lineTo(dispW, y);
      ctx.stroke();
      ctx.fillText(v.toString(), 1, y);
    }
  }

  /* ---- Save ---- */
  btnSave.onclick = function() {
    if (!glCanvas.width || !glCanvas.height || !gl) return;

    /* Force a fresh render */
    render();

    var w = glCanvas.width, h = glCanvas.height;
    var buf = new Uint8Array(w * h * 4);
    gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, buf);

    var ec = document.createElement("canvas");
    ec.width = w; ec.height = h;
    var ctx = ec.getContext("2d");
    var id = ctx.createImageData(w, h);
    for (var y = 0; y < h; y++) {
      var s = (h - 1 - y) * w * 4;
      var d = y * w * 4;
      for (var x = 0; x < w * 4; x++) { id.data[d + x] = buf[s + x]; }
    }
    ctx.putImageData(id, 0, 0);

    /* Try toDataURL fallback if toBlob fails */
    try {
      ec.toBlob(function(blob) {
        if (!blob) {
          fallbackSave(ec);
          return;
        }
        shareSave(blob);
      }, "image/png");
    } catch (e) {
      fallbackSave(ec);
    }
  };

  function shareSave(blob) {
    if (navigator.share && navigator.canShare) {
      try {
        var file = new File([blob], "density-field.png", { type: "image/png" });
        var sd = { files: [file] };
        if (navigator.canShare(sd)) {
          navigator.share(sd).catch(function() { dlBlob(blob); });
          return;
        }
      } catch (e) { /* fall through */ }
    }
    dlBlob(blob);
  }

  function dlBlob(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "density-field.png";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 2000);
  }

  function fallbackSave(canvas) {
    var dataUrl = canvas.toDataURL("image/png");
    var a = document.createElement("a");
    a.href = dataUrl; a.download = "density-field.png";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
  }

  /* ---- Resize ---- */
  var rT = null;
  window.onresize = function() {
    clearTimeout(rT);
    rT = setTimeout(function() {
      if (sourceData) {
        setupCanvas();
        render();
        drawGrid();
      }
    }, 200);
  };
})();
</script>
</body>
