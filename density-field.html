<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DENSITY FIELD — Light Density Structure Visualizer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0a; color:#c0c0c0; font-family:'Courier New',monospace;
  overflow:hidden; width:100vw; height:100vh; display:flex; flex-direction:column;
  -webkit-user-select:none; user-select:none;
}

#header {
  height:32px; display:flex; align-items:center; padding:0 12px;
  background:#0e0e0e; border-bottom:1px solid #1a1a1a; flex-shrink:0;
  justify-content:space-between;
}
#header .title { font-size:10px; letter-spacing:3px; color:#555; }
#header .title span { color:#999; }
#header .info { font-size:9px; color:#333; letter-spacing:1px; }

#main { flex:1; display:flex; position:relative; overflow:hidden; }

/* Canvas layer */
#canvasWrap {
  position:absolute; top:0; left:0; right:260px; bottom:0;
  display:flex; align-items:center; justify-content:center;
  background:#000;
}
#canvasWrap.full { right:0; }
#renderCanvas { display:block; background:#000; }
#previewImg {
  display:none; position:absolute; top:0; left:0; width:100%; height:100%;
  object-fit:contain; background:#000; z-index:2;
}
#previewImg.show { display:block; }

/* Hi-res preview overlay */
#hiresOverlay {
  display:none; position:absolute; top:0; left:0; right:0; bottom:0;
  z-index:10; background:#000; overflow:auto; cursor:zoom-out;
}
#hiresOverlay.show { display:block; }
#hiresOverlay canvas { display:block; margin:0 auto; }
#hiresClose {
  position:fixed; top:8px; right:8px; z-index:11;
  background:#181818; border:1px solid #333; color:#888;
  font-family:'Courier New',monospace; font-size:10px;
  padding:6px 14px; cursor:pointer; letter-spacing:2px;
}

/* Drop overlay */
#dropOverlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  background:rgba(5,5,5,0.95); z-index:20; pointer-events:none;
  transition:opacity 0.3s;
}
#dropOverlay.hidden { opacity:0; pointer-events:none; }
#dropOverlay .inner {
  border:1px dashed #333; padding:60px 80px; text-align:center;
}
#dropOverlay .inner p { font-size:11px; letter-spacing:3px; color:#555; margin-bottom:6px; }
#dropOverlay .inner .sub { font-size:9px; color:#333; }

/* Panel */
#panel {
  position:absolute; top:0; right:0; width:260px; height:100%;
  background:#0c0c0c; border-left:1px solid #181818;
  z-index:5; overflow-y:auto; padding:14px 12px;
  transition:transform 0.25s ease;
}
#panel.collapsed { transform:translateX(260px); }

#panelToggle {
  position:absolute; top:6px; z-index:6;
  background:#111; border:1px solid #222; color:#555;
  font-family:'Courier New',monospace; font-size:9px;
  padding:3px 8px; cursor:pointer; letter-spacing:1px;
  transition:right 0.25s ease;
  right:266px;
}
#panelToggle.shifted { right:6px; }

.p-section { margin-bottom:14px; }
.p-label {
  font-size:8px; letter-spacing:2.5px; color:#444;
  margin-bottom:7px; text-transform:uppercase;
  border-bottom:1px solid #1a1a1a; padding-bottom:4px;
}

/* Mode buttons */
.mode-btn {
  display:block; width:100%; background:#0e0e0e;
  border:1px solid #1a1a1a; color:#666;
  font-family:'Courier New',monospace; font-size:9px;
  padding:7px 8px; cursor:pointer; text-align:left;
  letter-spacing:0.5px; transition:all 0.12s;
  margin-bottom:2px;
}
.mode-btn:hover { border-color:#333; color:#999; }
.mode-btn.active { border-color:#555; color:#ccc; background:#141414; }
.mode-btn .mn { font-size:9px; }
.mode-btn .md { font-size:7.5px; color:#383838; display:block; margin-top:2px; }
.mode-btn.active .md { color:#4a4a4a; }

/* Sliders */
.sr { margin-bottom:8px; }
.sh { display:flex; justify-content:space-between; margin-bottom:2px; }
.sn { font-size:8px; color:#444; letter-spacing:1px; }
.sv { font-size:8px; color:#555; font-variant-numeric:tabular-nums; }
input[type="range"] {
  -webkit-appearance:none; appearance:none; width:100%; height:2px;
  background:#1a1a1a; outline:none; cursor:pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none; width:8px; height:12px; background:#444; border:none; cursor:pointer;
}
input[type="range"]::-moz-range-thumb {
  width:8px; height:12px; background:#444; border:none; cursor:pointer;
}

/* Color */
.color-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.color-swatch {
  width:20px; height:20px; border:1px solid #2a2a2a; cursor:pointer;
  position:relative; flex-shrink:0;
}
.color-swatch input[type="color"] {
  opacity:0; position:absolute; top:0; left:0; width:100%; height:100%; cursor:pointer;
}

/* Action buttons */
.act {
  background:#0e0e0e; border:1px solid #1a1a1a; color:#555;
  font-family:'Courier New',monospace; font-size:8px;
  padding:5px 10px; cursor:pointer; letter-spacing:2px;
  width:100%; margin-bottom:3px; text-align:center;
  transition:all 0.12s;
}
.act:hover { border-color:#333; color:#888; }
.act.highlight { border-color:#444; color:#aaa; }

/* Status bar */
#status {
  font-size:8px; color:#333; letter-spacing:1px;
  margin-top:8px; line-height:1.6;
}

#panel::-webkit-scrollbar { width:2px; }
#panel::-webkit-scrollbar-track { background:#0a0a0a; }
#panel::-webkit-scrollbar-thumb { background:#222; }
</style>
</head>
<body>

<div id="header">
  <div class="title"><span>DENSITY FIELD</span>&ensp;·&ensp;PROTOTYPE v2</div>
  <div class="info" id="headerInfo"></div>
</div>

<div id="main">
  <div id="canvasWrap">
    <canvas id="renderCanvas"></canvas>
    <img id="previewImg" alt="">
  </div>

  <div id="dropOverlay">
    <div class="inner">
      <p>DROP IMAGE</p>
      <div class="sub">or click to select</div>
    </div>
  </div>

  <div id="hiresOverlay">
    <canvas id="hiresCanvas"></canvas>
    <button id="hiresClose" onclick="closeHires()">CLOSE</button>
  </div>

  <button id="panelToggle" onclick="togglePanel()">CTRL</button>

  <div id="panel">
    <div class="p-section">
      <div class="p-label">MODE</div>
      <button class="mode-btn active" onclick="setMode(0)" id="mb0">
        <span class="mn">① CLASSIC WAVEFORM</span>
        <span class="md">密度→明度マッピング</span>
      </button>
      <button class="mode-btn" onclick="setMode(1)" id="mb1">
        <span class="mn">② PARTICLE</span>
        <span class="md">加算合成パーティクル</span>
      </button>
      <button class="mode-btn" onclick="setMode(2)" id="mb2">
        <span class="mn">③ LINE / FIBER</span>
        <span class="md">密度等高線の繊維描画</span>
      </button>
    </div>

    <div class="p-section">
      <div class="p-label">DENSITY</div>
      <div class="sr">
        <div class="sh"><span class="sn">GAIN</span><span class="sv" id="vGain">1.00</span></div>
        <input type="range" id="sGain" min="0.1" max="4.0" step="0.01" value="1.0" oninput="onParam(1)">
      </div>
      <div class="sr">
        <div class="sh"><span class="sn">GAMMA</span><span class="sv" id="vGamma">1.00</span></div>
        <input type="range" id="sGamma" min="0.2" max="3.0" step="0.01" value="1.0" oninput="onParam(1)">
      </div>
      <div class="sr">
        <div class="sh"><span class="sn">SPREAD</span><span class="sv" id="vSpread">2.0</span></div>
        <input type="range" id="sSpread" min="0.5" max="6.0" step="0.1" value="2.0" oninput="onParam(1)">
      </div>
      <div class="sr">
        <div class="sh"><span class="sn">DECAY</span><span class="sv" id="vDecay">0.00</span></div>
        <input type="range" id="sDecay" min="0.0" max="0.99" step="0.01" value="0.0" oninput="onParam(1)">
      </div>
    </div>

    <div class="p-section">
      <div class="p-label">RENDERING</div>
      <div class="sr">
        <div class="sh"><span class="sn">INTENSITY</span><span class="sv" id="vInt">1.00</span></div>
        <input type="range" id="sInt" min="0.1" max="5.0" step="0.01" value="1.0" oninput="onParam(0)">
      </div>
      <div class="sr">
        <div class="sh"><span class="sn">SMOOTHING</span><span class="sv" id="vSmooth">0.50</span></div>
        <input type="range" id="sSmooth" min="0.0" max="1.0" step="0.01" value="0.5" oninput="onParam(0)">
      </div>
      <div class="sr" id="rowPsize">
        <div class="sh"><span class="sn">PARTICLE SIZE</span><span class="sv" id="vPsize">3.0</span></div>
        <input type="range" id="sPsize" min="1.0" max="12.0" step="0.1" value="3.0" oninput="onParam(0)">
      </div>
      <div class="sr" id="rowGlow">
        <div class="sh"><span class="sn">GLOW</span><span class="sv" id="vGlow">0.60</span></div>
        <input type="range" id="sGlow" min="0.05" max="2.0" step="0.01" value="0.6" oninput="onParam(0)">
      </div>
      <div class="sr" id="rowLW">
        <div class="sh"><span class="sn">LINE WEIGHT</span><span class="sv" id="vLW">1.0</span></div>
        <input type="range" id="sLW" min="0.2" max="4.0" step="0.1" value="1.0" oninput="onParam(0)">
      </div>
      <div class="sr" id="rowLD">
        <div class="sh"><span class="sn">LINE DENSITY</span><span class="sv" id="vLD">1.00</span></div>
        <input type="range" id="sLD" min="0.2" max="4.0" step="0.01" value="1.0" oninput="onParam(0)">
      </div>
    </div>

    <div class="p-section">
      <div class="p-label">COLOR</div>
      <div class="color-row">
        <div class="color-swatch" id="cSwatch" style="background:#ffffff">
          <input type="color" id="cPick" value="#ffffff" oninput="onColor(this.value)">
        </div>
        <span class="sn">TINT</span>
      </div>
      <div class="sr">
        <div class="sh"><span class="sn">SATURATION</span><span class="sv" id="vSat">0.00</span></div>
        <input type="range" id="sSat" min="0.0" max="1.0" step="0.01" value="0.0" oninput="onParam(0)">
      </div>
      <div class="sr">
        <div class="sh"><span class="sn">BRIGHTNESS</span><span class="sv" id="vBright">1.00</span></div>
        <input type="range" id="sBright" min="0.1" max="3.0" step="0.01" value="1.0" oninput="onParam(0)">
      </div>
    </div>

    <div class="p-section">
      <div class="p-label">VIEW / OUTPUT</div>
      <button class="act" onclick="togglePreview()">SHOW SOURCE IMAGE</button>
      <button class="act highlight" onclick="renderHires()">HI-RES RENDER</button>
      <button class="act" onclick="loadImage()">LOAD IMAGE</button>
      <button class="act" onclick="saveImage()">SAVE PNG</button>
    </div>

    <div id="status"></div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<script>
// ======================================================
// DENSITY FIELD v2 — Rewritten
// ======================================================

var gl, canvas, canvasWrap;
var srcImage = null;
var srcData = null;
var densityTex = null;
var srcTex = null;
var currentMode = 0;
var showingPreview = false;

// Programs
var classicProg = null;
var particleProg = null;
var lineProg = null;

// Density
var densityBuf = null;
var densityW = 0, densityH = 0;

// Params
var P = {
  gain:1.0, gamma:1.0, spread:2.0, decay:0.0,
  intensity:1.0, smooth:0.5,
  psize:3.0, glow:0.6,
  lw:1.0, ld:1.0,
  tintR:1.0, tintG:1.0, tintB:1.0,
  saturation:0.0, brightness:1.0
};

// ===================== INIT =====================

function init() {
  canvas = document.getElementById('renderCanvas');
  canvasWrap = document.getElementById('canvasWrap');

  gl = canvas.getContext('webgl', {
    alpha:false, antialias:false, preserveDrawingBuffer:true, premultipliedAlpha:false
  });
  if (!gl) { alert('WebGL not supported'); return; }

  var floatExt = gl.getExtension('OES_texture_float');
  gl.getExtension('OES_texture_float_linear');

  if (!floatExt) {
    // Fallback: use UNSIGNED_BYTE textures
    window._noFloat = true;
  }

  setupShaders();
  fitCanvas();
  window.addEventListener('resize', function() { fitCanvas(); render(); });
  setupDragDrop();
  setupFileInput();
  updateVisibility();
  render();
}

function fitCanvas() {
  var rect = canvasWrap.getBoundingClientRect();
  var w = Math.round(rect.width);
  var h = Math.round(rect.height);

  if (srcData) {
    // Fit image aspect ratio within available space
    var iw = srcData.width;
    var ih = srcData.height;
    var aspect = iw / ih;
    var cw, ch;
    if (w / h > aspect) {
      ch = h;
      cw = Math.round(h * aspect);
    } else {
      cw = w;
      ch = Math.round(w / aspect);
    }
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);
  } else {
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = w;
    canvas.height = h;
  }
}

// ===================== SHADERS =====================

var quadVS = [
  'attribute vec2 a_pos;',
  'varying vec2 v_uv;',
  'void main() {',
  '  v_uv = a_pos * 0.5 + 0.5;',
  '  gl_Position = vec4(a_pos, 0.0, 1.0);',
  '}'
].join('\n');

// Classic: density -> brightness, with vertical Gaussian blur for anti-banding
var classicFS = [
  'precision highp float;',
  'varying vec2 v_uv;',
  'uniform sampler2D u_density;',
  'uniform sampler2D u_src;',
  'uniform float u_intensity;',
  'uniform float u_brightness;',
  'uniform float u_saturation;',
  'uniform vec3 u_tint;',
  'uniform float u_smooth;',
  'uniform vec2 u_texSize;',  // density texture size
  '',
  'void main() {',
  '  vec2 px = 1.0 / u_texSize;',
  '',
  '  // Vertical Gaussian blur (5-tap) to eliminate banding',
  '  float k0 = 0.382925;',  // center
  '  float k1 = 0.241730;',  // ±1
  '  float k2 = 0.060598;',  // ±2
  '  // Blend between raw and blurred based on smooth param',
  '  float raw = texture2D(u_density, v_uv).r;',
  '  float blurred = raw * k0',
  '    + texture2D(u_density, v_uv + vec2(0.0, -2.0*px.y)).r * k2',
  '    + texture2D(u_density, v_uv + vec2(0.0, -1.0*px.y)).r * k1',
  '    + texture2D(u_density, v_uv + vec2(0.0,  1.0*px.y)).r * k1',
  '    + texture2D(u_density, v_uv + vec2(0.0,  2.0*px.y)).r * k2;',
  '',
  '  // Also do horizontal blur',
  '  float hblur = raw * k0',
  '    + texture2D(u_density, v_uv + vec2(-2.0*px.x, 0.0)).r * k2',
  '    + texture2D(u_density, v_uv + vec2(-1.0*px.x, 0.0)).r * k1',
  '    + texture2D(u_density, v_uv + vec2( 1.0*px.x, 0.0)).r * k1',
  '    + texture2D(u_density, v_uv + vec2( 2.0*px.x, 0.0)).r * k2;',
  '',
  '  float d = mix(raw, (blurred + hblur) * 0.5, u_smooth);',
  '  d = d * u_intensity * u_brightness;',
  '',
  '  vec3 srcCol = texture2D(u_src, v_uv).rgb;',
  '  vec3 col = mix(vec3(d), srcCol * d * 1.5, u_saturation);',
  '  col = mix(col, u_tint * d, u_saturation * 0.3);',
  '',
  '  gl_FragColor = vec4(col, 1.0);',
  '}'
].join('\n');

// Particle: multi-layer additive soft dots
var particleFS = [
  'precision highp float;',
  'varying vec2 v_uv;',
  'uniform sampler2D u_density;',
  'uniform sampler2D u_src;',
  'uniform float u_intensity;',
  'uniform float u_brightness;',
  'uniform float u_saturation;',
  'uniform vec3 u_tint;',
  'uniform float u_psize;',
  'uniform float u_glow;',
  'uniform float u_smooth;',
  'uniform vec2 u_texSize;',
  '',
  'float hash21(vec2 p) {',
  '  p = fract(p * vec2(123.34, 456.21));',
  '  p += dot(p, p + 45.32);',
  '  return fract(p.x * p.y);',
  '}',
  '',
  'void main() {',
  '  vec2 px = 1.0 / u_texSize;',
  '  vec3 acc = vec3(0.0);',
  '',
  '  // Multiple particle layers for density',
  '  for (int layer = 0; layer < 3; layer++) {',
  '    float layerScale = u_psize * (1.0 + float(layer) * 0.7);',
  '    float cellPx = layerScale * 2.0;',
  '    vec2 cellSize = vec2(cellPx) * px;',
  '    vec2 cellIdx = floor(v_uv / cellSize);',
  '',
  '    // Check 3x3 neighborhood',
  '    for (int dy = -1; dy <= 1; dy++) {',
  '      for (int dx = -1; dx <= 1; dx++) {',
  '        vec2 neighborCell = cellIdx + vec2(float(dx), float(dy));',
  '        vec2 seed = neighborCell + float(layer) * 137.0;',
  '',
  '        // Random position within cell',
  '        float rx = hash21(seed);',
  '        float ry = hash21(seed + vec2(7.0, 13.0));',
  '        vec2 particleUV = (neighborCell + vec2(rx, ry)) * cellSize;',
  '',
  '        if (particleUV.x < 0.0 || particleUV.x > 1.0 || particleUV.y < 0.0 || particleUV.y > 1.0) continue;',
  '',
  '        // Sample density at particle position',
  '        float pd = texture2D(u_density, particleUV).r;',
  '        if (pd < 0.005) continue;',
  '',
  '        // Distance to particle',
  '        vec2 diff = (v_uv - particleUV) / px;',
  '        float dist2 = dot(diff, diff);',
  '        float radius = layerScale * (0.3 + pd * 0.7);',
  '        float r2 = radius * radius * u_glow;',
  '',
  '        // Soft Gaussian falloff',
  '        float falloff = exp(-dist2 / max(r2, 0.1));',
  '',
  '        // Color from source',
  '        vec3 srcCol = texture2D(u_src, particleUV).rgb;',
  '        vec3 col = mix(vec3(1.0), srcCol, u_saturation);',
  '        col = mix(col, u_tint, u_saturation * 0.3);',
  '',
  '        float brightness = pd * falloff * u_intensity * 0.4;',
  '        acc += col * brightness;',
  '      }',
  '    }',
  '  }',
  '',
  '  acc *= u_brightness;',
  '  gl_FragColor = vec4(acc, 1.0);',
  '}'
].join('\n');

// Line / Fiber: smooth contour lines with gradient-driven thickness
var lineFS = [
  'precision highp float;',
  'varying vec2 v_uv;',
  'uniform sampler2D u_density;',
  'uniform sampler2D u_src;',
  'uniform float u_intensity;',
  'uniform float u_brightness;',
  'uniform float u_saturation;',
  'uniform vec3 u_tint;',
  'uniform float u_lw;',
  'uniform float u_ld;',
  'uniform float u_smooth;',
  'uniform vec2 u_texSize;',
  '',
  'void main() {',
  '  vec2 px = 1.0 / u_texSize;',
  '',
  '  // Sample with smoothing',
  '  float d = texture2D(u_density, v_uv).r;',
  '  float dL = texture2D(u_density, v_uv + vec2(-px.x, 0.0)).r;',
  '  float dR = texture2D(u_density, v_uv + vec2( px.x, 0.0)).r;',
  '  float dU = texture2D(u_density, v_uv + vec2(0.0, -px.y)).r;',
  '  float dD = texture2D(u_density, v_uv + vec2(0.0,  px.y)).r;',
  '',
  '  // Smoothed value',
  '  float ds = mix(d, (dL + dR + dU + dD) * 0.25, u_smooth);',
  '',
  '  // Gradient magnitude',
  '  float gx = dR - dL;',
  '  float gy = dD - dU;',
  '  float grad = length(vec2(gx, gy));',
  '',
  '  // Multiple contour levels',
  '  float numLevels = 30.0 * u_ld;',
  '  float scaled = ds * numLevels;',
  '  float fractional = fract(scaled);',
  '',
  '  // Distance to nearest contour in density-space',
  '  float distToContour = min(fractional, 1.0 - fractional);',
  '',
  '  // Convert to pixel-space distance using gradient',
  '  float pixelDist = distToContour / (grad * numLevels + 0.001);',
  '',
  '  // Anti-aliased line',
  '  float lineWidth = u_lw;',
  '  float line = 1.0 - smoothstep(0.0, lineWidth, pixelDist);',
  '',
  '  // Modulate: stronger density = brighter, gradient adds definition',
  '  float val = line * ds * u_intensity;',
  '  val *= (0.5 + grad * 8.0);',
  '',
  '  // Color',
  '  vec3 srcCol = texture2D(u_src, v_uv).rgb;',
  '  vec3 col = mix(vec3(val), srcCol * val * 1.5, u_saturation);',
  '  col = mix(col, u_tint * val, u_saturation * 0.3);',
  '  col *= u_brightness;',
  '',
  '  gl_FragColor = vec4(col, 1.0);',
  '}'
].join('\n');

function compileShader(type, src) {
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function linkProgram(vSrc, fSrc) {
  var vs = compileShader(gl.VERTEX_SHADER, vSrc);
  var fs = compileShader(gl.FRAGMENT_SHADER, fSrc);
  if (!vs || !fs) return null;
  var p = gl.createProgram();
  gl.attachShader(p, vs);
  gl.attachShader(p, fs);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('Link error:', gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

var quadBuf = null;

function setupShaders() {
  classicProg = linkProgram(quadVS, classicFS);
  particleProg = linkProgram(quadVS, particleFS);
  lineProg = linkProgram(quadVS, lineFS);

  quadBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
}

// ===================== DENSITY ACCUMULATION v2 =====================
// Key changes from v1:
// - Gaussian spread (spread param controls sigma) across multiple rows
// - Much higher AH multiplier (x6) for smoother downsampling
// - Proper area-weighted downsampling

function buildDensityMap() {
  if (!srcData) return;

  var sw = srcData.width;
  var sh = srcData.height;
  var pixels = srcData.data;

  densityW = sw;
  densityH = sh;

  var gain = P.gain;
  var gamma = P.gamma;
  var spread = P.spread;
  var decay = P.decay;

  // High accumulation buffer: x6 for quality downsampling
  var AH = densityH * 6;
  var accum = new Float32Array(densityW * AH);

  // Gaussian spread: distribute each sample across multiple rows
  // sigma in AH-space pixels
  var sigma = spread * (AH / densityH);
  // Pre-compute Gaussian kernel (up to ±3sigma, max 12 pixels)
  var kernelRadius = Math.min(Math.ceil(sigma * 3), 12);
  var kernel = [];
  var kernelSum = 0;
  for (var k = -kernelRadius; k <= kernelRadius; k++) {
    var w = Math.exp(-(k * k) / (2.0 * sigma * sigma));
    kernel.push(w);
    kernelSum += w;
  }
  // Normalize
  for (var k = 0; k < kernel.length; k++) {
    kernel[k] /= kernelSum;
  }

  for (var x = 0; x < sw; x++) {
    for (var y = 0; y < sh; y++) {
      var idx = (y * sw + x) * 4;
      var r = pixels[idx];
      var g = pixels[idx + 1];
      var b = pixels[idx + 2];

      var lum = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255.0;
      lum = lum * gain;
      if (lum > 1.0) lum = 1.0;
      lum = Math.pow(lum, gamma);

      // Map luminance to Y in accumulation buffer
      var mappedY = (1.0 - lum) * (AH - 1);
      var baseY = Math.round(mappedY);

      // Distribute with Gaussian kernel
      for (var k = 0; k < kernel.length; k++) {
        var ky = baseY + (k - kernelRadius);
        if (ky >= 0 && ky < AH) {
          accum[x * AH + ky] += kernel[k];
        }
      }
    }
  }

  // Downsample: proper area-weighted box filter
  densityBuf = new Float32Array(densityW * densityH);
  var binSize = AH / densityH;

  for (var x = 0; x < densityW; x++) {
    for (var dy = 0; dy < densityH; dy++) {
      var y0 = dy * binSize;
      var y1 = y0 + binSize;
      var iy0 = Math.floor(y0);
      var iy1 = Math.ceil(y1);
      if (iy1 > AH) iy1 = AH;

      var sum = 0;
      for (var ay = iy0; ay < iy1; ay++) {
        // Weight: how much of this AH-pixel falls inside [y0, y1]
        var lo = Math.max(ay, y0);
        var hi = Math.min(ay + 1, y1);
        if (hi > lo) {
          sum += accum[x * AH + ay] * (hi - lo);
        }
      }
      densityBuf[dy * densityW + x] = sum / binSize;
    }
  }

  // Horizontal decay (column-to-column persistence)
  if (decay > 0.001) {
    for (var y = 0; y < densityH; y++) {
      // Left to right
      var prev = 0;
      for (var x = 0; x < densityW; x++) {
        var val = densityBuf[y * densityW + x];
        val = Math.max(val, prev * decay);
        densityBuf[y * densityW + x] = val;
        prev = val;
      }
      // Right to left (bidirectional)
      prev = 0;
      for (var x = densityW - 1; x >= 0; x--) {
        var val = densityBuf[y * densityW + x];
        val = Math.max(val, prev * decay);
        densityBuf[y * densityW + x] = val;
        prev = val;
      }
    }
  }

  // Normalize to [0, 1]
  var maxVal = 0;
  for (var i = 0; i < densityBuf.length; i++) {
    if (densityBuf[i] > maxVal) maxVal = densityBuf[i];
  }
  if (maxVal > 0) {
    var inv = 1.0 / maxVal;
    for (var i = 0; i < densityBuf.length; i++) {
      densityBuf[i] *= inv;
    }
  }

  uploadDensityTexture();
  updateStatus();
}

// ===================== TEXTURES =====================

function uploadDensityTexture() {
  if (!densityBuf) return;

  if (!densityTex) densityTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, densityTex);

  if (window._noFloat) {
    // Fallback: encode to UNSIGNED_BYTE
    var bytes = new Uint8Array(densityW * densityH * 4);
    for (var i = 0; i < densityW * densityH; i++) {
      var v = Math.min(255, Math.round(densityBuf[i] * 255));
      bytes[i*4] = v; bytes[i*4+1] = v; bytes[i*4+2] = v; bytes[i*4+3] = 255;
    }
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, densityW, densityH, 0, gl.RGBA, gl.UNSIGNED_BYTE, bytes);
  } else {
    var rgba = new Float32Array(densityW * densityH * 4);
    for (var i = 0; i < densityW * densityH; i++) {
      rgba[i*4] = densityBuf[i];
      rgba[i*4+1] = densityBuf[i];
      rgba[i*4+2] = densityBuf[i];
      rgba[i*4+3] = 1.0;
    }
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, densityW, densityH, 0, gl.RGBA, gl.FLOAT, rgba);
  }

  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

function uploadSrcTexture(img) {
  if (!srcTex) srcTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, srcTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

// ===================== RENDER =====================

function render() {
  if (!densityBuf) {
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0,0,0,1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    return;
  }

  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  var prog;
  if (currentMode === 0) prog = classicProg;
  else if (currentMode === 1) prog = particleProg;
  else prog = lineProg;
  if (!prog) return;

  gl.useProgram(prog);

  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, densityTex);
  gl.uniform1i(gl.getUniformLocation(prog, 'u_density'), 0);

  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, srcTex);
  gl.uniform1i(gl.getUniformLocation(prog, 'u_src'), 1);

  // Common uniforms
  gl.uniform1f(gl.getUniformLocation(prog, 'u_intensity'), P.intensity);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_brightness'), P.brightness);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_saturation'), P.saturation);
  gl.uniform3f(gl.getUniformLocation(prog, 'u_tint'), P.tintR, P.tintG, P.tintB);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_smooth'), P.smooth);
  gl.uniform2f(gl.getUniformLocation(prog, 'u_texSize'), densityW, densityH);

  if (currentMode === 1) {
    gl.uniform1f(gl.getUniformLocation(prog, 'u_psize'), P.psize);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_glow'), P.glow);
  }
  if (currentMode === 2) {
    gl.uniform1f(gl.getUniformLocation(prog, 'u_lw'), P.lw);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_ld'), P.ld);
  }

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ===================== HI-RES RENDER =====================

function renderHires() {
  if (!densityBuf) return;

  var overlay = document.getElementById('hiresOverlay');
  var hc = document.getElementById('hiresCanvas');
  overlay.classList.add('show');

  // Render at 2x source resolution (capped at 4096 for WebGL)
  var maxDim = Math.min(gl.getParameter(gl.MAX_TEXTURE_SIZE), 4096);
  var scale = 2;
  var w = Math.min(densityW * scale, maxDim);
  var h = Math.min(densityH * scale, maxDim);

  // Use the main GL context but render to larger viewport
  // We temporarily resize the canvas
  var oldW = canvas.width;
  var oldH = canvas.height;
  var oldSW = canvas.style.width;
  var oldSH = canvas.style.height;

  canvas.width = w;
  canvas.height = h;
  render();

  // Copy to hires canvas
  hc.width = w;
  hc.height = h;
  var ctx2d = hc.getContext('2d');
  ctx2d.drawImage(canvas, 0, 0);

  // Restore
  canvas.width = oldW;
  canvas.height = oldH;
  canvas.style.width = oldSW;
  canvas.style.height = oldSH;
  render();

  // Scale hires canvas for display
  var vw = window.innerWidth;
  var vh = window.innerHeight - 40;
  var dispScale = Math.min(vw / w, vh / h, 1);
  hc.style.width = Math.round(w * dispScale) + 'px';
  hc.style.height = Math.round(h * dispScale) + 'px';
  hc.style.marginTop = Math.max(0, Math.round((vh - h * dispScale) / 2)) + 'px';
}

function closeHires() {
  document.getElementById('hiresOverlay').classList.remove('show');
}

// ===================== IMAGE LOADING =====================

function processImage(img) {
  srcImage = img;

  var tmpC = document.createElement('canvas');
  tmpC.width = img.naturalWidth || img.width;
  tmpC.height = img.naturalHeight || img.height;
  var ctx = tmpC.getContext('2d');
  ctx.drawImage(img, 0, 0);
  srcData = ctx.getImageData(0, 0, tmpC.width, tmpC.height);

  // Set preview image source
  document.getElementById('previewImg').src = tmpC.toDataURL();

  uploadSrcTexture(img);
  fitCanvas();
  buildDensityMap();
  document.getElementById('dropOverlay').classList.add('hidden');
  render();
}

function loadImage() { document.getElementById('fileInput').click(); }

function setupFileInput() {
  document.getElementById('fileInput').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() { processImage(img); };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('dropOverlay').addEventListener('click', function() { loadImage(); });
}

function setupDragDrop() {
  var main = document.getElementById('main');
  main.addEventListener('dragover', function(e) { e.preventDefault(); });
  main.addEventListener('drop', function(e) {
    e.preventDefault();
    var file = e.dataTransfer.files[0];
    if (!file || !file.type.match('image.*')) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() { processImage(img); };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ===================== UI =====================

function setMode(m) {
  currentMode = m;
  for (var i = 0; i < 3; i++) {
    document.getElementById('mb' + i).classList.remove('active');
  }
  document.getElementById('mb' + m).classList.add('active');
  updateVisibility();
  render();
}

function updateVisibility() {
  document.getElementById('rowPsize').style.display = (currentMode === 1) ? '' : 'none';
  document.getElementById('rowGlow').style.display = (currentMode === 1) ? '' : 'none';
  document.getElementById('rowLW').style.display = (currentMode === 2) ? '' : 'none';
  document.getElementById('rowLD').style.display = (currentMode === 2) ? '' : 'none';
}

// onParam(needRebuild): 1 = rebuild density, 0 = just re-render
function onParam(rebuild) {
  P.gain = parseFloat(document.getElementById('sGain').value);
  P.gamma = parseFloat(document.getElementById('sGamma').value);
  P.spread = parseFloat(document.getElementById('sSpread').value);
  P.decay = parseFloat(document.getElementById('sDecay').value);
  P.intensity = parseFloat(document.getElementById('sInt').value);
  P.smooth = parseFloat(document.getElementById('sSmooth').value);
  P.psize = parseFloat(document.getElementById('sPsize').value);
  P.glow = parseFloat(document.getElementById('sGlow').value);
  P.lw = parseFloat(document.getElementById('sLW').value);
  P.ld = parseFloat(document.getElementById('sLD').value);
  P.saturation = parseFloat(document.getElementById('sSat').value);
  P.brightness = parseFloat(document.getElementById('sBright').value);

  document.getElementById('vGain').textContent = P.gain.toFixed(2);
  document.getElementById('vGamma').textContent = P.gamma.toFixed(2);
  document.getElementById('vSpread').textContent = P.spread.toFixed(1);
  document.getElementById('vDecay').textContent = P.decay.toFixed(2);
  document.getElementById('vInt').textContent = P.intensity.toFixed(2);
  document.getElementById('vSmooth').textContent = P.smooth.toFixed(2);
  document.getElementById('vPsize').textContent = P.psize.toFixed(1);
  document.getElementById('vGlow').textContent = P.glow.toFixed(2);
  document.getElementById('vLW').textContent = P.lw.toFixed(1);
  document.getElementById('vLD').textContent = P.ld.toFixed(2);
  document.getElementById('vSat').textContent = P.saturation.toFixed(2);
  document.getElementById('vBright').textContent = P.brightness.toFixed(2);

  if (rebuild && srcData) {
    buildDensityMap();
  }
  render();
}

function onColor(hex) {
  document.getElementById('cSwatch').style.background = hex;
  P.tintR = parseInt(hex.substr(1,2), 16) / 255;
  P.tintG = parseInt(hex.substr(3,2), 16) / 255;
  P.tintB = parseInt(hex.substr(5,2), 16) / 255;
  render();
}

function togglePanel() {
  var panel = document.getElementById('panel');
  var btn = document.getElementById('panelToggle');
  var wrap = document.getElementById('canvasWrap');
  panel.classList.toggle('collapsed');
  btn.classList.toggle('shifted');
  wrap.classList.toggle('full');
  setTimeout(function() { fitCanvas(); render(); }, 280);
}

function togglePreview() {
  showingPreview = !showingPreview;
  var el = document.getElementById('previewImg');
  if (showingPreview && srcImage) {
    el.classList.add('show');
  } else {
    el.classList.remove('show');
    showingPreview = false;
  }
}

function saveImage() {
  if (!densityBuf) return;
  var url = canvas.toDataURL('image/png');
  var a = document.createElement('a');
  a.href = url;
  a.download = 'density-field-' + Date.now() + '.png';
  a.click();
}

function updateStatus() {
  if (!srcData) return;
  document.getElementById('headerInfo').textContent =
    srcData.width + ' x ' + srcData.height + '  |  MODE ' + (currentMode + 1);
  document.getElementById('status').textContent =
    'DENSITY: ' + densityW + 'x' + densityH +
    '  AH: x6 (' + (densityH * 6) + ')' +
    '  SPREAD: ' + P.spread.toFixed(1) + 'σ';
}

// Click hires overlay to close
document.getElementById('hiresOverlay').addEventListener('click', function(e) {
  if (e.target === this || e.target === document.getElementById('hiresCanvas')) {
    closeHires();
  }
});

// ===================== START =====================
window.addEventListener('DOMContentLoaded', init);
</script>
