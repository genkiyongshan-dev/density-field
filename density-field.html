<!DOCTYPE html>
<html lang="ja">
<head>

<title>DENSITY FIELD v4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#aaa;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;-webkit-user-select:none;user-select:none}
#header{height:28px;display:flex;align-items:center;padding:0 10px;background:#080808;border-bottom:1px solid #111;flex-shrink:0;justify-content:space-between}
#header .t{font-size:9px;letter-spacing:3px;color:#333}
#header .t b{color:#666;font-weight:normal}
#header .info{font-size:8px;color:#282828;letter-spacing:1px}
#main{flex:1;display:flex;position:relative;overflow:hidden}
#cWrap{position:absolute;top:0;left:0;right:240px;bottom:0;display:flex;align-items:center;justify-content:center;background:#000}
#cWrap.full{right:0}
canvas#gl{display:block;background:#000}

/* Source preview */
#srcPrev{display:none;position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#000;z-index:3}
#srcPrev.show{display:block}

/* Hires */
#hiOv{display:none;position:absolute;top:0;left:0;right:0;bottom:0;z-index:20;background:#000;overflow:auto}
#hiOv.show{display:flex;align-items:center;justify-content:center}
#hiOv img{max-width:100%;max-height:100%;object-fit:contain;cursor:zoom-out}
#hiCl{position:fixed;top:6px;right:6px;z-index:21;background:#0a0a0a;border:1px solid #2a2a2a;color:#666;font-family:'Courier New',monospace;font-size:8px;padding:3px 10px;cursor:pointer;letter-spacing:2px}

/* Drop */
#drOv{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(3,3,3,0.97);z-index:30;transition:opacity 0.3s}
#drOv.hidden{opacity:0;pointer-events:none}
#drOv .inn{border:1px dashed #222;padding:50px 70px;text-align:center}
#drOv .inn p{font-size:10px;letter-spacing:3px;color:#383838}
#drOv .inn .s{font-size:8px;color:#222;margin-top:4px}

/* Panel */
#pnl{position:absolute;top:0;right:0;width:240px;height:100%;background:#080808;border-left:1px solid #111;z-index:5;overflow-y:auto;padding:10px 9px;transition:transform 0.2s}
#pnl.collapsed{transform:translateX(240px)}
#togB{position:absolute;top:4px;z-index:6;background:#0a0a0a;border:1px solid #181818;color:#383838;font-family:'Courier New',monospace;font-size:8px;padding:2px 6px;cursor:pointer;letter-spacing:1px;transition:right 0.2s;right:246px}
#togB.shifted{right:4px}
.sc{margin-bottom:11px}
.lb{font-size:7px;letter-spacing:2.5px;color:#2a2a2a;margin-bottom:5px;text-transform:uppercase;border-bottom:1px solid #111;padding-bottom:3px}
.mb{display:block;width:100%;background:#090909;border:1px solid #141414;color:#4a4a4a;font-family:'Courier New',monospace;font-size:8px;padding:5px 6px;cursor:pointer;text-align:left;letter-spacing:0.5px;margin-bottom:1px;transition:all 0.1s}
.mb:hover{border-color:#222;color:#777}
.mb.a{border-color:#383838;color:#aaa;background:#0e0e0e}
.mb .d{font-size:6.5px;color:#222;display:block;margin-top:1px}
.mb.a .d{color:#333}
.sr{margin-bottom:6px}
.sh{display:flex;justify-content:space-between;margin-bottom:1px}
.sn{font-size:7px;color:#303030;letter-spacing:1px}
.sv{font-size:7px;color:#3a3a3a;font-variant-numeric:tabular-nums}
input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:2px;background:#141414;outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:6px;height:10px;background:#333;border:none;cursor:pointer}
.ab{background:#090909;border:1px solid #141414;color:#383838;font-family:'Courier New',monospace;font-size:7px;padding:4px 7px;cursor:pointer;letter-spacing:1.5px;width:100%;margin-bottom:2px;text-align:center;transition:all 0.1s}
.ab:hover{border-color:#222;color:#666}
.ab.hl{border-color:#2a2a2a;color:#777}
.crow{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.csw{width:16px;height:16px;border:1px solid #1a1a1a;position:relative}
.csw input{opacity:0;position:absolute;top:0;left:0;width:100%;height:100%;cursor:pointer}
#stB{font-size:6.5px;color:#1a1a1a;letter-spacing:0.5px;margin-top:5px;line-height:1.5}
#pnl::-webkit-scrollbar{width:2px}
#pnl::-webkit-scrollbar-track{background:#060606}
#pnl::-webkit-scrollbar-thumb{background:#151515}
</style>

<body>
<div id="header">
  <div class="t"><b>DENSITY FIELD</b> · v4</div>
  <div class="info" id="hI"></div>
</div>
<div id="main">
  <div id="cWrap">
    <canvas id="gl"></canvas>
    <img id="srcPrev" alt="">
  </div>
  <div id="drOv">
    <div class="inn"><p>DROP IMAGE</p><div class="s">or click to select</div></div>
  </div>
  <div id="hiOv">
    <img id="hiImg" alt="">
    <button id="hiCl" onclick="closeHi()">CLOSE</button>
  </div>
  <button id="togB" onclick="togPnl()">CTRL</button>
  <div id="pnl">
    <div class="sc">
      <div class="lb">MODE</div>
      <button class="mb a" onclick="setM(0)" id="m0">① CLASSIC<span class="d">密度→輝度</span></button>
      <button class="mb" onclick="setM(1)" id="m1">② PARTICLE<span class="d">加算合成発光</span></button>
      <button class="mb" onclick="setM(2)" id="m2">③ FIBER<span class="d">等密度線</span></button>
    </div>
    <div class="sc">
      <div class="lb">DENSITY</div>
      <div class="sr"><div class="sh"><span class="sn">GAIN</span><span class="sv" id="vG">1.00</span></div><input type="range" id="sG" min="0.1" max="4.0" step="0.01" value="1.0" oninput="onP()"></div>
      <div class="sr"><div class="sh"><span class="sn">GAMMA</span><span class="sv" id="vGm">1.00</span></div><input type="range" id="sGm" min="0.2" max="3.0" step="0.01" value="1.0" oninput="onP()"></div>
    </div>
    <div class="sc">
      <div class="lb">RENDERING</div>
      <div class="sr"><div class="sh"><span class="sn">INTENSITY</span><span class="sv" id="vIn">1.00</span></div><input type="range" id="sIn" min="0.1" max="5.0" step="0.01" value="1.0" oninput="onP()"></div>
      <div class="sr" id="rPs"><div class="sh"><span class="sn">PARTICLE SIZE</span><span class="sv" id="vPs">2.0</span></div><input type="range" id="sPs" min="0.5" max="8.0" step="0.1" value="2.0" oninput="onP()"></div>
      <div class="sr" id="rGl"><div class="sh"><span class="sn">GLOW</span><span class="sv" id="vGl">1.00</span></div><input type="range" id="sGl" min="0.1" max="4.0" step="0.01" value="1.0" oninput="onP()"></div>
      <div class="sr" id="rLd"><div class="sh"><span class="sn">LINE DENSITY</span><span class="sv" id="vLd">1.00</span></div><input type="range" id="sLd" min="0.2" max="4.0" step="0.01" value="1.0" oninput="onP()"></div>
    </div>
    <div class="sc">
      <div class="lb">COLOR</div>
      <div class="crow"><div class="csw" id="cSw" style="background:#fff"><input type="color" id="cPk" value="#ffffff" oninput="onC(this.value)"></div><span class="sn">GLOW COLOR</span></div>
    </div>
    <div class="sc">
      <div class="lb">GRID</div>
      <div class="sr"><div class="sh"><span class="sn">GRID OPACITY</span><span class="sv" id="vGr">0.15</span></div><input type="range" id="sGr" min="0.0" max="0.5" step="0.01" value="0.15" oninput="onP()"></div>
    </div>
    <div class="sc">
      <div class="lb">OUTPUT</div>
      <div class="sr"><div class="sh"><span class="sn">RENDER SCALE</span><span class="sv" id="vRs">2x</span></div><input type="range" id="sRs" min="1" max="4" step="1" value="2" oninput="onRs()"></div>
      <button class="ab" onclick="togSrc()">SHOW SOURCE</button>
      <button class="ab hl" onclick="renderHi()">HI-RES RENDER</button>
      <button class="ab" onclick="loadImg()">LOAD IMAGE</button>
      <button class="ab" onclick="savePng()">SAVE PNG</button>
    </div>
    <div id="stB"></div>
  </div>
</div>
<input type="file" id="fIn" accept="image/*" style="display:none">
<script>
// ======================================================
// DENSITY FIELD v4 — Full GPU
// Density computed PER-PIXEL in fragment shader
// No CPU density map, no banding from texture resolution
// Source image = information only, never drawn directly
// ======================================================

var glCanvas, gl, cWrap;
var srcTex = null;
var srcW = 0, srcH = 0;
var srcImg = null;
var curMode = 0;
var showingSrc = false;
var renderScale = 2;
var quadBuf = null;
var programs = [];

var P = {
  gain:1.0, gamma:1.0,
  intensity:1.0,
  psize:2.0, glow:1.0,
  ld:1.0,
  tR:1.0, tG:1.0, tB:1.0,
  gridOp:0.15
};

// ===================== SHADERS =====================

var vsrc = [
  'attribute vec2 a_pos;',
  'varying vec2 v_uv;',
  'void main(){',
  '  v_uv = a_pos * 0.5 + 0.5;',
  '  gl_Position = vec4(a_pos, 0.0, 1.0);',
  '}'
].join('\n');

// Core density function: shared across all modes
// For each output pixel (u,v), scan the source column at u
// and accumulate: how many source pixels in that column
// have a luminance that maps near this v position?
// This is computed entirely in the shader = no banding!
var densityFunc = [
  'uniform sampler2D u_src;',
  'uniform vec2 u_srcSize;',    // source width, height
  'uniform float u_gain;',
  'uniform float u_gamma;',
  '',
  '// Compute density at output UV coordinate',
  '// This scans the entire source column for this x position',
  'float getDensity(vec2 uv) {',
  '  float srcH = u_srcSize.y;',
  '  float density = 0.0;',
  '',
  '  // Number of samples = source height (scan every pixel in column)',
  '  // For performance, step by 1 source pixel',
  '  float invSrcH = 1.0 / srcH;',
  '',
  '  for (float i = 0.0; i < 4096.0; i += 1.0) {',
  '    if (i >= srcH) break;',
  '    float sy = (i + 0.5) * invSrcH;',
  '',
  '    // Read source pixel luminance at (uv.x, sy)',
  '    vec4 texel = texture2D(u_src, vec2(uv.x, sy));',
  '    float lum = dot(texel.rgb, vec3(0.2126, 0.7152, 0.0722));',
  '    lum = clamp(lum * u_gain, 0.0, 1.0);',
  '    lum = pow(lum, u_gamma);',
  '',
  '    // This source pixel maps to Y position (1-lum) in output',
  '    float targetY = 1.0 - lum;',
  '',
  '    // How close is our output Y to this target?',
  '    float dist = abs(uv.y - targetY);',
  '',
  '    // Smooth kernel: Gaussian contribution',
  '    // Width scales with 1/srcH so each pixel contributes a smooth bump',
  '    float sigma = 1.5 * invSrcH;',
  '    density += exp(-dist * dist / (2.0 * sigma * sigma));',
  '  }',
  '',
  '  // Normalize by source height',
  '  density *= invSrcH;',
  '  return density;',
  '}',
  ''
].join('\n');

// Mode 0: Classic — density drives brightness directly
var frag0 = [
  'precision highp float;',
  'varying vec2 v_uv;',
  densityFunc,
  'uniform float u_intensity;',
  'uniform vec3 u_color;',
  'uniform float u_gridOp;',
  '',
  'void main(){',
  '  float d = getDensity(v_uv);',
  '  d = d * u_intensity;',
  '',
  '  // Tone mapping: soft clamp for natural look',
  '  d = d / (d + 0.3);',
  '',
  '  vec3 col = u_color * d;',
  '',
  '  // Grid lines',
  '  if (u_gridOp > 0.001) {',
  '    float gx = step(0.998, fract(v_uv.x * 10.0)) * u_gridOp * 0.5;',
  '    float gy = step(0.998, fract(v_uv.y * 10.0)) * u_gridOp * 0.5;',
  '    float gx2 = step(0.999, fract(v_uv.x * 50.0)) * u_gridOp * 0.15;',
  '    float gy2 = step(0.999, fract(v_uv.y * 50.0)) * u_gridOp * 0.15;',
  '    col += vec3(gx + gy + gx2 + gy2);',
  '  }',
  '',
  '  gl_FragColor = vec4(col, 1.0);',
  '}'
].join('\n');

// Mode 1: Particle — density creates glowing dots
var frag1 = [
  'precision highp float;',
  'varying vec2 v_uv;',
  densityFunc,
  'uniform float u_intensity;',
  'uniform vec3 u_color;',
  'uniform float u_psize;',
  'uniform float u_glow;',
  'uniform float u_gridOp;',
  'uniform vec2 u_outSize;',
  '',
  'float hash(vec2 p){',
  '  p=fract(p*vec2(123.34,456.21));',
  '  p+=dot(p,p+45.32);',
  '  return fract(p.x*p.y);',
  '}',
  '',
  'void main(){',
  '  float d = getDensity(v_uv);',
  '  vec2 px = 1.0 / u_outSize;',
  '',
  '  // Base glow from density',
  '  float base = d * u_intensity * 0.3;',
  '  base = base / (base + 0.2);',
  '',
  '  // Particle layer: grid of cells, jittered particles',
  '  float cellPx = u_psize * 3.0;',
  '  vec2 cellSize = vec2(cellPx) * px;',
  '  vec2 cellIdx = floor(v_uv / cellSize);',
  '  vec3 acc = vec3(0.0);',
  '',
  '  for(int dy=-1;dy<=1;dy++){',
  '    for(int dx=-1;dx<=1;dx++){',
  '      vec2 nc = cellIdx + vec2(float(dx),float(dy));',
  '      float rx = hash(nc);',
  '      float ry = hash(nc + vec2(7.0,13.0));',
  '      vec2 pUV = (nc + vec2(rx, ry)) * cellSize;',
  '',
  '      if(pUV.x<0.0||pUV.x>1.0||pUV.y<0.0||pUV.y>1.0) continue;',
  '',
  '      float pd = getDensity(pUV);',
  '      if(pd < 0.01) continue;',
  '',
  '      vec2 diff = (v_uv - pUV) / px;',
  '      float dist2 = dot(diff, diff);',
  '      float r = u_psize * (0.3 + pd * 0.7);',
  '      float falloff = exp(-dist2 / (r * r * u_glow));',
  '',
  '      acc += u_color * pd * falloff * u_intensity * 0.5;',
  '    }',
  '  }',
  '',
  '  vec3 col = u_color * base + acc;',
  '',
  '  if(u_gridOp > 0.001){',
  '    float g = step(0.998, fract(v_uv.x*10.0))*u_gridOp*0.5',
  '           + step(0.998, fract(v_uv.y*10.0))*u_gridOp*0.5;',
  '    col += vec3(g);',
  '  }',
  '',
  '  gl_FragColor = vec4(col, 1.0);',
  '}'
].join('\n');

// Mode 2: Fiber — contour lines of density field
var frag2 = [
  'precision highp float;',
  'varying vec2 v_uv;',
  densityFunc,
  'uniform float u_intensity;',
  'uniform vec3 u_color;',
  'uniform float u_ld;',
  'uniform float u_gridOp;',
  'uniform vec2 u_outSize;',
  '',
  'void main(){',
  '  float d = getDensity(v_uv);',
  '  vec2 px = 1.0 / u_outSize;',
  '',
  '  // Gradient via finite differences of density',
  '  float dR = getDensity(v_uv + vec2(px.x * 2.0, 0.0));',
  '  float dL = getDensity(v_uv - vec2(px.x * 2.0, 0.0));',
  '  float dU = getDensity(v_uv - vec2(0.0, px.y * 2.0));',
  '  float dD = getDensity(v_uv + vec2(0.0, px.y * 2.0));',
  '  float gx = dR - dL;',
  '  float gy = dD - dU;',
  '  float grad = length(vec2(gx, gy));',
  '',
  '  // Contour lines',
  '  float levels = 25.0 * u_ld;',
  '  float scaled = d * levels;',
  '  float f = fract(scaled);',
  '  float distToLine = min(f, 1.0 - f);',
  '  float pixDist = distToLine / (grad * levels + 0.0001);',
  '',
  '  float line = 1.0 - smoothstep(0.0, 1.5, pixDist);',
  '  float val = line * d * u_intensity * (0.3 + grad * 15.0);',
  '  val = val / (val + 0.25);',
  '',
  '  vec3 col = u_color * val;',
  '',
  '  if(u_gridOp > 0.001){',
  '    float g = step(0.998, fract(v_uv.x*10.0))*u_gridOp*0.5',
  '           + step(0.998, fract(v_uv.y*10.0))*u_gridOp*0.5;',
  '    col += vec3(g);',
  '  }',
  '',
  '  gl_FragColor = vec4(col, 1.0);',
  '}'
].join('\n');

// ===================== GL SETUP =====================

function initGL() {
  glCanvas = document.getElementById('gl');
  cWrap = document.getElementById('cWrap');

  gl = glCanvas.getContext('webgl', {
    alpha:false, antialias:false, preserveDrawingBuffer:true, premultipliedAlpha:false
  });
  if (!gl) { alert('WebGL required'); return; }

  quadBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

  programs[0] = mkProg(vsrc, frag0);
  programs[1] = mkProg(vsrc, frag1);
  programs[2] = mkProg(vsrc, frag2);

  fitCanvas();
  window.addEventListener('resize', function(){ fitCanvas(); render(); });
  setupIO();
  updateVis();
  render();
}

function mkShader(type, src) {
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function mkProg(vs, fs) {
  var v = mkShader(gl.VERTEX_SHADER, vs);
  var f = mkShader(gl.FRAGMENT_SHADER, fs);
  if (!v || !f) return null;
  var p = gl.createProgram();
  gl.attachShader(p, v);
  gl.attachShader(p, f);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

function fitCanvas() {
  var rect = cWrap.getBoundingClientRect();
  var aw = Math.round(rect.width);
  var ah = Math.round(rect.height);

  if (srcW > 0 && srcH > 0) {
    var aspect = srcW / srcH;
    var cw, ch;
    if (aw / ah > aspect) { ch = ah; cw = Math.round(ah * aspect); }
    else { cw = aw; ch = Math.round(aw / aspect); }
    glCanvas.style.width = cw + 'px';
    glCanvas.style.height = ch + 'px';
    // Use DPR for sharp preview
    var dpr = window.devicePixelRatio || 1;
    glCanvas.width = Math.round(cw * dpr);
    glCanvas.height = Math.round(ch * dpr);
  } else {
    glCanvas.style.width = aw + 'px';
    glCanvas.style.height = ah + 'px';
    glCanvas.width = aw;
    glCanvas.height = ah;
  }
}

// ===================== RENDER =====================

function render() {
  var w = glCanvas.width;
  var h = glCanvas.height;

  gl.viewport(0, 0, w, h);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  if (!srcTex || srcW === 0) return;

  var prog = programs[curMode];
  if (!prog) return;

  gl.useProgram(prog);

  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, srcTex);
  gl.uniform1i(gl.getUniformLocation(prog, 'u_src'), 0);

  gl.uniform2f(gl.getUniformLocation(prog, 'u_srcSize'), srcW, srcH);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_gain'), P.gain);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_gamma'), P.gamma);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_intensity'), P.intensity);
  gl.uniform3f(gl.getUniformLocation(prog, 'u_color'), P.tR, P.tG, P.tB);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_gridOp'), P.gridOp);

  if (curMode === 1) {
    gl.uniform1f(gl.getUniformLocation(prog, 'u_psize'), P.psize);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_glow'), P.glow);
    gl.uniform2f(gl.getUniformLocation(prog, 'u_outSize'), w, h);
  }
  if (curMode === 2) {
    gl.uniform1f(gl.getUniformLocation(prog, 'u_ld'), P.ld);
    gl.uniform2f(gl.getUniformLocation(prog, 'u_outSize'), w, h);
  }

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ===================== HI-RES RENDER =====================

function renderHi() {
  if (!srcTex || srcW === 0) return;

  var scale = renderScale;
  var outW = Math.min(srcW * scale, 8192);
  var outH = Math.min(srcH * scale, 8192);

  // Check max texture/viewport size
  var maxSize = gl.getParameter(gl.MAX_VIEWPORT_DIMS);
  outW = Math.min(outW, maxSize[0]);
  outH = Math.min(outH, maxSize[1]);

  // Save current state
  var oldW = glCanvas.width;
  var oldH = glCanvas.height;
  var oldSW = glCanvas.style.width;
  var oldSH = glCanvas.style.height;

  // Resize to hi-res
  glCanvas.width = outW;
  glCanvas.height = outH;
  render();

  // Capture
  var dataURL = glCanvas.toDataURL('image/png');

  // Restore
  glCanvas.width = oldW;
  glCanvas.height = oldH;
  glCanvas.style.width = oldSW;
  glCanvas.style.height = oldSH;
  render();

  // Show overlay
  document.getElementById('hiImg').src = dataURL;
  document.getElementById('hiOv').classList.add('show');
  window._hiData = dataURL;

  document.getElementById('hI').textContent = 'HI-RES: ' + outW + 'x' + outH;
}

function closeHi() {
  document.getElementById('hiOv').classList.remove('show');
}

// ===================== IMAGE LOADING =====================

function processImg(img) {
  srcImg = img;
  srcW = img.naturalWidth || img.width;
  srcH = img.naturalHeight || img.height;

  // Upload as texture
  if (!srcTex) srcTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, srcTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

  // Preview source
  var tc = document.createElement('canvas');
  tc.width = srcW; tc.height = srcH;
  tc.getContext('2d').drawImage(img, 0, 0);
  document.getElementById('srcPrev').src = tc.toDataURL();

  document.getElementById('drOv').classList.add('hidden');
  fitCanvas();
  render();

  document.getElementById('hI').textContent = srcW + 'x' + srcH;
}

function loadImg() { document.getElementById('fIn').click(); }

function setupIO() {
  document.getElementById('fIn').addEventListener('change', function(e) {
    var f = e.target.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function(ev) {
      var img = new Image();
      img.onload = function() { processImg(img); };
      img.src = ev.target.result;
    };
    r.readAsDataURL(f);
  });
  document.getElementById('drOv').addEventListener('click', function() { loadImg(); });
  var m = document.getElementById('main');
  m.addEventListener('dragover', function(e) { e.preventDefault(); });
  m.addEventListener('drop', function(e) {
    e.preventDefault();
    var f = e.dataTransfer.files[0];
    if (!f || !f.type.match('image.*')) return;
    var r = new FileReader();
    r.onload = function(ev) {
      var img = new Image();
      img.onload = function() { processImg(img); };
      img.src = ev.target.result;
    };
    r.readAsDataURL(f);
  });
  document.getElementById('hiOv').addEventListener('click', function(e) {
    if (e.target === this || e.target === document.getElementById('hiImg')) closeHi();
  });
}

// ===================== UI =====================

function setM(m) {
  curMode = m;
  for (var i = 0; i < 3; i++) document.getElementById('m'+i).classList.remove('a');
  document.getElementById('m'+m).classList.add('a');
  updateVis();
  render();
}

function updateVis() {
  document.getElementById('rPs').style.display = curMode === 1 ? '' : 'none';
  document.getElementById('rGl').style.display = curMode === 1 ? '' : 'none';
  document.getElementById('rLd').style.display = curMode === 2 ? '' : 'none';
}

function onP() {
  P.gain = parseFloat(document.getElementById('sG').value);
  P.gamma = parseFloat(document.getElementById('sGm').value);
  P.intensity = parseFloat(document.getElementById('sIn').value);
  P.psize = parseFloat(document.getElementById('sPs').value);
  P.glow = parseFloat(document.getElementById('sGl').value);
  P.ld = parseFloat(document.getElementById('sLd').value);
  P.gridOp = parseFloat(document.getElementById('sGr').value);

  document.getElementById('vG').textContent = P.gain.toFixed(2);
  document.getElementById('vGm').textContent = P.gamma.toFixed(2);
  document.getElementById('vIn').textContent = P.intensity.toFixed(2);
  document.getElementById('vPs').textContent = P.psize.toFixed(1);
  document.getElementById('vGl').textContent = P.glow.toFixed(2);
  document.getElementById('vLd').textContent = P.ld.toFixed(2);
  document.getElementById('vGr').textContent = P.gridOp.toFixed(2);

  render();
}

function onC(hex) {
  document.getElementById('cSw').style.background = hex;
  P.tR = parseInt(hex.substr(1,2),16)/255;
  P.tG = parseInt(hex.substr(3,2),16)/255;
  P.tB = parseInt(hex.substr(5,2),16)/255;
  render();
}

function onRs() {
  renderScale = parseInt(document.getElementById('sRs').value);
  document.getElementById('vRs').textContent = renderScale + 'x';
}

function togPnl() {
  document.getElementById('pnl').classList.toggle('collapsed');
  document.getElementById('togB').classList.toggle('shifted');
  document.getElementById('cWrap').classList.toggle('full');
  setTimeout(function(){ fitCanvas(); render(); }, 250);
}

function togSrc() {
  showingSrc = !showingSrc;
  var el = document.getElementById('srcPrev');
  if (showingSrc && srcImg) el.classList.add('show');
  else { el.classList.remove('show'); showingSrc = false; }
}

function savePng() {
  var url = window._hiData || glCanvas.toDataURL('image/png');
  var a = document.createElement('a');
  a.href = url; a.download = 'density-field-' + Date.now() + '.png'; a.click();
}

window.addEventListener('DOMContentLoaded', initGL);
</script>
